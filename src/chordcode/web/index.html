<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chord Code</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">

  <!-- Styles -->
  <link rel="stylesheet" href="/static/styles/base.css">
  <link rel="stylesheet" href="/static/styles/layout.css">
  <link rel="stylesheet" href="/static/styles/components.css">
  <link rel="stylesheet" href="/static/styles/sidebar.css">
  <link rel="stylesheet" href="/static/styles/chat.css">
  <link rel="stylesheet" href="/static/styles/parts.css">
  <link rel="stylesheet" href="/static/styles/observability.css">
  <link rel="stylesheet" href="/static/styles/knowledge.css">
  <link rel="stylesheet" href="/static/styles/settings.css">
  <link rel="stylesheet" href="/static/styles/channels.css">
  <link rel="stylesheet" href="/static/styles/cronjobs.css">

  <!-- Preact & HTM (UMD builds) -->
  <script src="https://unpkg.com/preact@10.19.3/dist/preact.umd.js"></script>
  <script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

  <!-- Marked for Markdown -->
  <script src="https://unpkg.com/marked@11.1.1/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; color: #9fb0c0;">
      Loading...
    </div>
  </div>

  <script>
    // Setup HTM with Preact
    const html = htm.bind(preact.h);
    const { render } = preact;
    const { useState, useEffect, useRef, useMemo, useCallback } = preactHooks;

    // ============ Resize Hook ============
    // Returns { width, handleProps } for a draggable resize handle.
    // `side` is 'left' (sidebar, grows rightward) or 'right' (observability, grows leftward).
    function useResizable(initialWidth, { min = 160, max = 600, side = 'left', storageKey } = {}) {
      const stored = storageKey && localStorage.getItem(storageKey);
      const [width, setWidth] = useState(stored ? Number(stored) : initialWidth);
      const dragging = useRef(false);
      const startX = useRef(0);
      const startW = useRef(0);
      const activeRef = useRef(null);

      useEffect(() => {
        function onMouseMove(e) {
          if (!dragging.current) return;
          const delta = e.clientX - startX.current;
          const next = side === 'left'
            ? Math.min(max, Math.max(min, startW.current + delta))
            : Math.min(max, Math.max(min, startW.current - delta));
          setWidth(next);
        }
        function onMouseUp() {
          if (!dragging.current) return;
          dragging.current = false;
          document.body.classList.remove('resizing');
          if (activeRef.current) {
            activeRef.current.classList.remove('active');
            activeRef.current = null;
          }
        }
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        return () => {
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
        };
      }, [min, max, side]);

      // persist to localStorage on change
      useEffect(() => {
        if (storageKey) localStorage.setItem(storageKey, String(width));
      }, [width, storageKey]);

      const handleProps = useMemo(() => ({
        onMouseDown: (e) => {
          e.preventDefault();
          dragging.current = true;
          startX.current = e.clientX;
          startW.current = width;
          document.body.classList.add('resizing');
          if (e.currentTarget) {
            e.currentTarget.classList.add('active');
            activeRef.current = e.currentTarget;
          }
        },
      }), [width]);

      return { width, setWidth, handleProps };
    }

    // ============ API ============
    async function api(url, options = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || 'Request failed');
      }
      return res.json();
    }

    // ============ Utilities ============
    function formatTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDateTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return String(ts);
      return d.toLocaleString();
    }

    function formatRelative(ts) {
      if (!ts) return '';
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      if (days > 0) return days + 'd ago';
      if (hours > 0) return hours + 'h ago';
      if (mins > 0) return mins + 'm ago';
      return 'just now';
    }

    function formatDuration(ms) {
      if (!ms) return '';
      if (ms < 1000) return ms + 'ms';
      return (ms / 1000).toFixed(1) + 's';
    }

    function renderMd(text) {
      if (!text) return '';
      try {
        return marked.parse(text);
      } catch (e) {
        return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
    }

    // ============ SSE Manager ============
    let sseSource = null;
    let sseCallback = null;

    function disconnectSSE() {
      if (sseSource) {
        sseSource.close();
        sseSource = null;
      }
      sseCallback = null;
    }

    function connectSSE(sessionId, onEvent) {
      disconnectSSE();
      sseCallback = onEvent;

      const url = '/events?session_id=' + encodeURIComponent(sessionId);
      sseSource = new EventSource(url);

      sseSource.onopen = () => {
        console.log('[SSE] Connected');
      };

      sseSource.onmessage = (evt) => {
        try {
          const event = JSON.parse(evt.data);
          if (sseCallback) sseCallback(event);
        } catch (e) {
          console.error('[SSE] Parse error:', e);
        }
      };

      sseSource.onerror = () => {
        console.warn('[SSE] Connection error');
      };
    }

    function sortSessionsByUpdated(list) {
      return [...list].sort((a, b) => (b.updated_at || 0) - (a.updated_at || 0));
    }

    // ============ Main App ============
    function App() {
      const [sessions, setSessions] = useState([]);
      const [activeSessionId, setActiveSessionId] = useState(null);
      const [messages, setMessages] = useState(new Map());
      const [parts, setParts] = useState(new Map());
      const [partsByMessage, setPartsByMessage] = useState(new Map());
      const [todos, setTodos] = useState([]);
      const [events, setEvents] = useState([]);
      const [pendingPermissions, setPendingPermissions] = useState([]);
      const [sessionStatus, setSessionStatus] = useState('idle');
      const [showNewSessionForm, setShowNewSessionForm] = useState(false);
      const [observabilityTab, setObservabilityTab] = useState('events');
      const [observabilityCollapsed, setObservabilityCollapsed] = useState(false);
      const [defaultWorktree, setDefaultWorktree] = useState('');
      const [logFiles, setLogFiles] = useState([]);
      const [selectedLogDate, setSelectedLogDate] = useState('');
      const [logFilters, setLogFilters] = useState({ level: '', event: '', session_id: '', q: '' });
      const [logItems, setLogItems] = useState([]);
      const [logTotal, setLogTotal] = useState(0);
      const [logOffset, setLogOffset] = useState(0);
      const [logLimit, setLogLimit] = useState(100);
      const [logHasMore, setLogHasMore] = useState(false);
      const [logLoading, setLogLoading] = useState(false);
      const [logError, setLogError] = useState('');
      const [expandedLogLineNo, setExpandedLogLineNo] = useState(null);
      const [logFiltersInitialized, setLogFiltersInitialized] = useState(false);
      const [sessionAction, setSessionAction] = useState({ renamingId: null, deletingId: null });

      // Activity bar + side panel state
      const [activeSidePanel, setActiveSidePanel] = useState('chat');

      // MCP state
      const [mcpServers, setMcpServers] = useState([]);
      const [mcpTools, setMcpTools] = useState([]);
      const [mcpLoading, setMcpLoading] = useState(false);
      const [mcpError, setMcpError] = useState('');

      // Skills state
      const [skills, setSkills] = useState([]);
      const [skillsLoading, setSkillsLoading] = useState(false);
      const [skillsError, setSkillsError] = useState('');

      // KB state
      const [kbConfig, setKbConfig] = useState(null);

      // Settings state
      const [settingsConfig, setSettingsConfig] = useState(null);
      const [settingsSchema, setSettingsSchema] = useState(null);
      const [settingsSources, setSettingsSources] = useState(null);
      const [settingsRawProject, setSettingsRawProject] = useState('');
      const [settingsRawGlobal, setSettingsRawGlobal] = useState('');
      const [settingsLoaded, setSettingsLoaded] = useState(false);
      const [settingsError, setSettingsError] = useState('');

      // Resizable panels
      const sidebar = useResizable(260, { min: 180, max: 500, side: 'left', storageKey: 'cc_sidebar_w' });
      const observability = useResizable(320, { min: 200, max: 600, side: 'right', storageKey: 'cc_obs_w' });
      // Handle SSE events
      const handleSSEEvent = useCallback((event) => {
        const { type, properties } = event;

        // Add to events log
        setEvents(prev => [{ type, properties, time: Date.now() }, ...prev].slice(0, 100));

        switch (type) {
          case 'session.status':
            setSessionStatus(properties.status);
            break;

          case 'message.updated':
            const msg = properties.info;
            setMessages(prev => {
              const next = new Map(prev);
              next.set(msg.id, msg);
              return next;
            });
            break;

          case 'message.part.updated':
            const part = properties.part;
            setParts(prev => {
              const next = new Map(prev);
              next.set(part.id, part);
              return next;
            });
            setPartsByMessage(prev => {
              const next = new Map(prev);
              const pset = next.get(part.message_id) || new Set();
              pset.add(part.id);
              next.set(part.message_id, pset);
              return next;
            });
            break;

          case 'permission.asked':
            setPendingPermissions(prev => [...prev, properties]);
            break;

          case 'permission.replied':
            setPendingPermissions(prev => prev.filter(p => p.id !== properties.request_id));
            break;

          case 'todo.updated':
            setTodos(properties.todos || []);
            break;
        }
      }, []);

      // Load initial data
      useEffect(() => {
        api('/config').then(cfg => {
          setDefaultWorktree(cfg.default_worktree || '');
        }).catch(e => console.error('Config error:', e));

        api('/sessions').then(data => {
          const sessionList = sortSessionsByUpdated(data.sessions || []);
          setSessions(sessionList);
          if (data.sessions && data.sessions.length > 0) {
            selectSession(sessionList[0].id);
          }
        }).catch(e => console.error('Sessions error:', e));
      }, []);

      useEffect(() => {
        if (!logFiltersInitialized && activeSessionId) {
          setLogFilters(prev => ({ ...prev, session_id: prev.session_id || activeSessionId }));
          setLogFiltersInitialized(true);
        }
      }, [activeSessionId, logFiltersInitialized]);

      useEffect(() => {
        if (observabilityTab === 'logs') {
          refreshLogs();
        }
      }, [observabilityTab]);

      function clearSessionView() {
        setActiveSessionId(null);
        setMessages(new Map());
        setParts(new Map());
        setPartsByMessage(new Map());
        setTodos([]);
        setPendingPermissions([]);
        setSessionStatus('idle');
        disconnectSSE();
      }

      // Select session
      async function selectSession(id) {
        if (!id) {
          clearSessionView();
          return;
        }

        setActiveSessionId(id);
        setMessages(new Map());
        setParts(new Map());
        setPartsByMessage(new Map());
        setTodos([]);
        setPendingPermissions([]);
        setSessionStatus('idle');

        // Connect SSE
        connectSSE(id, handleSSEEvent);

        // Load messages
        try {
          const msgList = await api('/sessions/' + id + '/messages');
          const msgMap = new Map();
          const partMap = new Map();
          const pbmMap = new Map();

          msgList.forEach(mwp => {
            msgMap.set(mwp.info.id, mwp.info);
            const pids = new Set();
            mwp.parts.forEach(p => {
              partMap.set(p.id, p);
              pids.add(p.id);
            });
            pbmMap.set(mwp.info.id, pids);
          });

          setMessages(msgMap);
          setParts(partMap);
          setPartsByMessage(pbmMap);
        } catch (e) {
          console.error('Messages error:', e);
        }

        // Load todos
        try {
          const data = await api('/sessions/' + id + '/todos');
          setTodos(data.todos || []);
        } catch (e) {
          console.error('Todos error:', e);
        }
      }

      // Create session
      async function createSession(worktree, title) {
        try {
          const session = await api('/sessions', {
            method: 'POST',
            body: JSON.stringify({ worktree: worktree, title: title || 'New Session' }),
          });
          setSessions(prev => sortSessionsByUpdated([session, ...prev]));
          setShowNewSessionForm(false);
          selectSession(session.id);
        } catch (e) {
          alert('Failed to create session: ' + e.message);
        }
      }

      async function renameSession(sessionId, title) {
        const normalizedTitle = (title || '').trim();
        if (!normalizedTitle) {
          alert('Title cannot be empty.');
          return false;
        }

        setSessionAction(prev => ({ ...prev, renamingId: sessionId }));
        try {
          const updated = await api('/sessions/' + sessionId, {
            method: 'PATCH',
            body: JSON.stringify({ title: normalizedTitle }),
          });
          setSessions(prev => {
            const merged = prev.map(s => (s.id === sessionId ? updated : s));
            return sortSessionsByUpdated(merged);
          });
          return true;
        } catch (e) {
          alert('Failed to rename session: ' + e.message);
          return false;
        } finally {
          setSessionAction(prev => ({ ...prev, renamingId: null }));
        }
      }

      async function deleteSession(sessionId) {
        const target = sessions.find(s => s.id === sessionId);
        if (!target) return;

        const ok = window.confirm(
          'Delete session "' + target.title + '"? This will remove all related messages and todos.'
        );
        if (!ok) return;

        setSessionAction(prev => ({ ...prev, deletingId: sessionId }));
        try {
          await api('/sessions/' + sessionId, { method: 'DELETE' });
          const remaining = sessions.filter(s => s.id !== sessionId);
          setSessions(remaining);

          if (activeSessionId === sessionId) {
            if (remaining.length > 0) {
              await selectSession(remaining[0].id);
            } else {
              clearSessionView();
            }
          }
        } catch (e) {
          alert('Failed to delete session: ' + e.message);
        } finally {
          setSessionAction(prev => ({ ...prev, deletingId: null }));
        }
      }

      async function requestLogs(date, offset, filters, limit = logLimit) {
        const params = new URLSearchParams();
        params.set('date', date);
        params.set('offset', String(Math.max(0, offset)));
        params.set('limit', String(limit));

        const normalized = {
          level: (filters.level || '').trim(),
          event: (filters.event || '').trim(),
          session_id: (filters.session_id || '').trim(),
          q: (filters.q || '').trim(),
        };
        if (normalized.level) params.set('level', normalized.level);
        if (normalized.event) params.set('event', normalized.event);
        if (normalized.session_id) params.set('session_id', normalized.session_id);
        if (normalized.q) params.set('q', normalized.q);

        const data = await api('/logs?' + params.toString());
        setLogItems(data.items || []);
        setLogTotal(data.total || 0);
        setLogOffset(data.offset || 0);
        setLogLimit(data.limit || limit);
        setLogHasMore(Boolean(data.has_more));
        setExpandedLogLineNo(null);
      }

      async function refreshLogs() {
        setLogLoading(true);
        setLogError('');
        try {
          const data = await api('/logs/files');
          const files = data.files || [];
          setLogFiles(files);

          let nextDate = selectedLogDate;
          if (!nextDate || !files.some(f => f.date === nextDate)) {
            nextDate = data.default_date || '';
          }
          setSelectedLogDate(nextDate);

          let nextFilters = logFilters;
          if (!logFiltersInitialized && activeSessionId) {
            nextFilters = { ...logFilters, session_id: activeSessionId };
            setLogFilters(nextFilters);
            setLogFiltersInitialized(true);
          }

          if (nextDate) {
            await requestLogs(nextDate, 0, nextFilters, logLimit);
          } else {
            setLogItems([]);
            setLogTotal(0);
            setLogOffset(0);
            setLogHasMore(false);
          }
        } catch (e) {
          setLogError('Failed to load logs: ' + e.message);
          setLogItems([]);
          setLogTotal(0);
          setLogOffset(0);
          setLogHasMore(false);
        } finally {
          setLogLoading(false);
        }
      }

      async function runLogSearch(offset = 0, filters = logFilters) {
        if (!selectedLogDate) {
          setLogError('Please select a log date first.');
          setLogItems([]);
          setLogTotal(0);
          setLogOffset(0);
          setLogHasMore(false);
          return;
        }
        setLogLoading(true);
        setLogError('');
        try {
          await requestLogs(selectedLogDate, offset, filters, logLimit);
        } catch (e) {
          setLogError('Failed to load logs: ' + e.message);
          setLogItems([]);
          setLogTotal(0);
          setLogOffset(0);
          setLogHasMore(false);
        } finally {
          setLogLoading(false);
        }
      }

      function handleLogFilterChange(field, value) {
        setLogFilters(prev => ({ ...prev, [field]: value }));
      }

      function handleResetLogFilters() {
        const nextFilters = {
          level: '',
          event: '',
          session_id: activeSessionId || '',
          q: '',
        };
        setLogFilters(nextFilters);
        setLogFiltersInitialized(true);
        runLogSearch(0, nextFilters);
      }

      // -- MCP data functions --
      async function refreshMcp() {
        setMcpLoading(true);
        setMcpError('');
        try {
          const [statusData, toolsData] = await Promise.all([
            api('/mcp/status'),
            api('/mcp/tools'),
          ]);
          setMcpServers(statusData.servers || []);
          setMcpTools(toolsData.tools || []);
        } catch (e) {
          setMcpError('Failed to load MCP status: ' + e.message);
        } finally {
          setMcpLoading(false);
        }
      }

      async function mcpConnect(name) {
        try {
          await api('/mcp/' + encodeURIComponent(name) + '/connect', { method: 'POST' });
          await refreshMcp();
        } catch (e) {
          alert('Failed to connect MCP server: ' + e.message);
        }
      }

      async function mcpDisconnect(name) {
        try {
          await api('/mcp/' + encodeURIComponent(name) + '/disconnect', { method: 'POST' });
          await refreshMcp();
        } catch (e) {
          alert('Failed to disconnect MCP server: ' + e.message);
        }
      }

      async function mcpAddServer(name, config) {
        try {
          await api('/mcp/servers', {
            method: 'POST',
            body: JSON.stringify({ name, config }),
          });
          await refreshMcp();
        } catch (e) {
          alert('Failed to add MCP server: ' + e.message);
        }
      }

      // -- Skills data functions --
      async function refreshSkills() {
        setSkillsLoading(true);
        setSkillsError('');
        try {
          const data = await api('/skills');
          setSkills(data.skills || []);
        } catch (e) {
          setSkillsError('Failed to load skills: ' + e.message);
        } finally {
          setSkillsLoading(false);
        }
      }

      async function loadSkillDetail(name) {
        try {
          const data = await api('/skills/' + encodeURIComponent(name));
          return data;
        } catch (e) {
          alert('Failed to load skill detail: ' + e.message);
          return null;
        }
      }

      // Lazy-load data when switching side panel
      function handleSidePanelChange(panel) {
        setActiveSidePanel(panel);
        if (panel === 'mcp' && mcpServers.length === 0 && !mcpLoading) {
          refreshMcp();
        }
        if (panel === 'skills' && skills.length === 0 && !skillsLoading) {
          refreshSkills();
        }
        if (panel === 'knowledge' && kbConfig === null) {
          api('/kb/config').then(cfg => setKbConfig(cfg)).catch(() => setKbConfig({ enabled: false }));
        }
        if (panel === 'settings' && !settingsLoaded) {
          setSettingsError('');
          Promise.all([
            api('/config'),
            api('/config/schema'),
            api('/config/sources'),
            api('/config/raw?scope=project').catch(() => ({ content: '', exists: false })),
            api('/config/raw?scope=global').catch(() => ({ content: '', exists: false })),
          ]).then(([cfg, schema, sources, rawProject, rawGlobal]) => {
            setSettingsConfig(cfg);
            setSettingsSchema(schema);
            setSettingsSources(sources.sources || []);
            setSettingsRawProject(rawProject.content || '');
            setSettingsRawGlobal(rawGlobal.content || '');
            setSettingsLoaded(true);
          }).catch(e => {
            setSettingsError('Failed to load settings: ' + e.message);
            setSettingsLoaded(true);
          });
        }
      }

      function refreshSettings() {
        setSettingsLoaded(false);
        setSettingsError('');
        Promise.all([
          api('/config'),
          api('/config/schema'),
          api('/config/sources'),
          api('/config/raw?scope=project').catch(() => ({ content: '', exists: false })),
          api('/config/raw?scope=global').catch(() => ({ content: '', exists: false })),
        ]).then(([cfg, schema, sources, rawProject, rawGlobal]) => {
          setSettingsConfig(cfg);
          setSettingsSchema(schema);
          setSettingsSources(sources.sources || []);
          setSettingsRawProject(rawProject.content || '');
          setSettingsRawGlobal(rawGlobal.content || '');
          setSettingsLoaded(true);
        }).catch(e => {
          setSettingsError('Failed to load settings: ' + e.message);
          setSettingsLoaded(true);
        });
      }

      const activeSession = sessions.find(s => s.id === activeSessionId);

      // Build dynamic grid-template-columns based on resize state
      const isKnowledgeMode = activeSidePanel === 'knowledge';
      const isSettingsMode = activeSidePanel === 'settings';
      const isChannelsMode = activeSidePanel === 'channels';
      const isCronJobsMode = activeSidePanel === 'cronjobs';
      const isFullPageMode = isKnowledgeMode || isSettingsMode || isChannelsMode || isCronJobsMode;
      const obsW = observabilityCollapsed ? '48px' : observability.width + 'px';
      const gridStyle = isFullPageMode
        ? 'grid-template-columns: 48px 1fr'
        : 'grid-template-columns: 48px ' + sidebar.width + 'px 1fr ' + obsW;

      // Position resize handles at the right edge of their respective panels
      const sidebarHandleLeft = 48 + sidebar.width;      // activity-bar + sidebar
      const obsHandleRight = observabilityCollapsed ? null : observability.width;

      return html`
        <div class="app-layout" style=${gridStyle}>
          <${Header}
            session=${activeSession}
            status=${sessionStatus}
            onToggleObservability=${() => setObservabilityCollapsed(!observabilityCollapsed)}
            observabilityCollapsed=${observabilityCollapsed}
          />
          <${ActivityBar}
            active=${activeSidePanel}
            onChange=${handleSidePanelChange}
          />
          ${isSettingsMode ? html`
            <${SettingsPanel}
              config=${settingsConfig}
              schema=${settingsSchema}
              sources=${settingsSources}
              rawProject=${settingsRawProject}
              rawGlobal=${settingsRawGlobal}
              loaded=${settingsLoaded}
              error=${settingsError}
              onRefresh=${refreshSettings}
            />
          ` : isChannelsMode ? html`
            <${ChannelsPanel} />
          ` : isCronJobsMode ? html`
            <${CronJobsPanel}
              sessions=${sessions}
              activeSessionId=${activeSessionId}
            />
          ` : isKnowledgeMode ? html`
            <${KnowledgePanel} config=${kbConfig} />
          ` : html`
            <${SidePanel}
              activeSidePanel=${activeSidePanel}
              sessions=${sessions}
              activeId=${activeSessionId}
              onSelect=${selectSession}
              onCreate=${createSession}
              onRename=${renameSession}
              onDelete=${deleteSession}
              showForm=${showNewSessionForm}
              onToggleForm=${() => setShowNewSessionForm(!showNewSessionForm)}
              defaultWorktree=${defaultWorktree}
              renamingId=${sessionAction.renamingId}
              deletingId=${sessionAction.deletingId}

    // ============ SessionsList (was Sidebar) ============
    function SessionsList({
      sessions,
      activeId,
      onSelect,
      onCreate,
      onRename,
      onDelete,
      showForm,
      onToggleForm,
      defaultWorktree,
      renamingId,
      deletingId,
    }) {
      const [worktree, setWorktree] = useState(defaultWorktree || '');
      const [title, setTitle] = useState('');
      const [editingSessionId, setEditingSessionId] = useState(null);
      const [editingTitle, setEditingTitle] = useState('');

      useEffect(() => {
        if (defaultWorktree && !worktree) {
          setWorktree(defaultWorktree);
        }
      }, [defaultWorktree]);

      useEffect(() => {
        if (editingSessionId && !sessions.some(s => s.id === editingSessionId)) {
          setEditingSessionId(null);
          setEditingTitle('');
        }
      }, [sessions, editingSessionId]);

      function handleCreate(e) {
        e.preventDefault();
        if (worktree.trim()) {
          onCreate(worktree.trim(), title.trim());
          setWorktree(defaultWorktree || '');
          setTitle('');
        }
      }

      function startRename(e, session) {
        e.stopPropagation();
        setEditingSessionId(session.id);
        setEditingTitle(session.title);
      }

      function cancelRename(e) {
        if (e) e.stopPropagation();
        setEditingSessionId(null);
        setEditingTitle('');
      }

      async function submitRename(e, sessionId) {
        if (e) {
          e.preventDefault();
          e.stopPropagation();
        }
        const ok = await onRename(sessionId, editingTitle);
        if (ok) {
          setEditingSessionId(null);
          setEditingTitle('');
        }
      }

      function requestDelete(e, sessionId) {
        e.stopPropagation();
        onDelete(sessionId);
      }

      return html`
        <div class="sidebar-inner" style="display:flex;flex-direction:column;height:100%">
          <div class="sidebar-header">
            <button class="new-session-btn" onClick=${onToggleForm}>
              ${showForm ? '\u2715 Cancel' : '+ New Session'}
            </button>
          </div>

          ${showForm && html`
            <form class="new-session-form" onSubmit=${handleCreate}>
              <div class="form-group">
                <label>Worktree Path</label>
                <input
                  class="input"
                  type="text"
                  value=${worktree}
                  onInput=${(e) => setWorktree(e.target.value)}
                  placeholder="/path/to/project"
                  required
                />
              </div>
              <div class="form-group">
                <label>Title (optional)</label>
                <input
                  class="input"
                  type="text"
                  value=${title}
                  onInput=${(e) => setTitle(e.target.value)}
                  placeholder="My Session"
                />
              </div>
              <div class="form-actions">
                <button type="submit" class="btn" disabled=${!worktree.trim()}>Create</button>
              </div>
            </form>
          `}

          <div class="sidebar-content">
            <div class="sidebar-title">Sessions</div>
            <div class="session-list">
              ${sessions.length === 0 && html`
                <div class="session-empty">
                  <div class="session-empty-icon">\u{1F4AC}</div>
                  <div class="session-empty-text">No sessions yet</div>
                </div>
              `}
              ${sessions.map(s => {
                const isEditing = editingSessionId === s.id;
                return html`
                  <div
                    key=${s.id}
                    class="session-item ${s.id === activeId ? 'active' : ''}"
                    onClick=${() => {
                      if (!isEditing) onSelect(s.id);
                    }}
                  >
                    <div class="session-item-indicator"></div>
                    <div class="session-item-content">
                      ${isEditing ? html`
                        <form
                          class="session-rename-form"
                          onSubmit=${(e) => submitRename(e, s.id)}
                          onClick=${(e) => e.stopPropagation()}
                        >
                          <input
                            class="input session-rename-input"
                            type="text"
                            value=${editingTitle}
                            onInput=${(e) => setEditingTitle(e.target.value)}
                            onKeyDown=${(e) => {
                              if (e.key === 'Escape') {
                                cancelRename(e);
                              }
                            }}
                            disabled=${renamingId === s.id}
                            autoFocus
                          />
                          <div class="session-rename-actions">
                            <button
                              type="submit"
                              class="session-action-btn"
                              title="Save"
                              aria-label="Save session title"
                              disabled=${renamingId === s.id || !editingTitle.trim()}
                            >
                              \u2713
                            </button>
                            <button
                              type="button"
                              class="session-action-btn"
                              title="Cancel"
                              aria-label="Cancel session rename"
                              onClick=${cancelRename}
                              disabled=${renamingId === s.id}
                            >
                              \u2715
                            </button>
                          </div>
                        </form>
                      ` : html`
                        <div class="session-item-title">${s.title}</div>
                        <div class="session-item-meta">${formatRelative(s.updated_at)}</div>
                      `}
                    </div>
                    ${!isEditing && html`
                      <div class="session-item-actions" onClick=${(e) => e.stopPropagation()}>
                        <button
                          class="session-action-btn"
                          title="Rename"
                          aria-label="Rename session"
                          onClick=${(e) => startRename(e, s)}
                          disabled=${deletingId === s.id}
                        >
                          \u270E
                        </button>
                        <button
                          class="session-action-btn danger"
                          title="Delete"
                          aria-label="Delete session"
                          onClick=${(e) => requestDelete(e, s.id)}
                          disabled=${deletingId === s.id || renamingId === s.id}
                        >
                          ${deletingId === s.id ? '\u2026' : '\u{1F5D1}'}
                        </button>
                      </div>
                    `}
                  </div>
                `;
              })}
            </div>
          </div>
        </div>
      `;
    }

    // ============ McpPanel ============
    function McpPanel({ servers, tools, loading, error, onRefresh, onConnect, onDisconnect, onAddServer }) {
      const [expandedServer, setExpandedServer] = useState(null);
      const [expandedTool, setExpandedTool] = useState(null);
      const [showAddForm, setShowAddForm] = useState(false);
      const [addType, setAddType] = useState('local');
      const [addName, setAddName] = useState('');
      const [addCommand, setAddCommand] = useState('');
      const [addArgs, setAddArgs] = useState('');
      const [addUrl, setAddUrl] = useState('');

      function serverTools(serverName) {
        return tools.filter(t => t.server === serverName);
      }

      function handleAddSubmit(e) {
        e.preventDefault();
        const name = addName.trim();
        if (!name) return;
        let config;
        if (addType === 'local') {
          const cmd = addCommand.trim();
          if (!cmd) return;
          const args = addArgs.trim() ? addArgs.trim().split(/\s+/) : [];
          config = { command: cmd, args };
        } else {
          const url = addUrl.trim();
          if (!url) return;
          config = { url };
        }
        onAddServer(name, config);
        setAddName('');
        setAddCommand('');
        setAddArgs('');
        setAddUrl('');
        setShowAddForm(false);
      }

      return html`
        <div class="mcp-panel">
          <div class="mcp-panel-header">
            <h3>MCP Servers</h3>
            <button class="icon-btn" onClick=${onRefresh} title="Refresh" disabled=${loading}>
              ${loading ? '' : '\u21BB'}
              ${loading && html`<span class="spinner" style="width:14px;height:14px"></span>`}
            </button>
          </div>
          <div class="mcp-server-list">
            ${error && html`<div class="mcp-server-error">${error}</div>`}
            ${!loading && servers.length === 0 && !error && html`
              <div class="observability-empty" style="padding:24px 12px">
                <div class="observability-empty-icon">\u{1F50C}</div>
                <div class="observability-empty-text">No MCP servers configured</div>
              </div>
            `}
            ${servers.map(s => {
              const isExpanded = expandedServer === s.name;
              const sTools = serverTools(s.name);
              return html`
                <div key=${s.name} class="mcp-server-card">
                  <div class="mcp-server-header" onClick=${() => setExpandedServer(isExpanded ? null : s.name)}>
                    <span class="tool-card-chevron ${isExpanded ? 'expanded' : ''}">\u25B6</span>
                    <span class="mcp-server-name">${s.name}</span>
                    <span class="mcp-server-badge ${s.status}">${s.status}</span>
                    ${s.tool_count > 0 && html`<span class="mcp-server-tool-count">${s.tool_count} tools</span>`}
                  </div>
                  ${isExpanded && html`
                    <div class="mcp-server-actions">
                      ${s.status === 'connected' ? html`
                        <button class="btn btn-sm btn-danger" onClick=${() => onDisconnect(s.name)}>Disconnect</button>
                      ` : html`
                        <button class="btn btn-sm btn-success" onClick=${() => onConnect(s.name)}>Connect</button>
                      `}
                    </div>
                    ${s.error && html`<div class="mcp-server-error">${s.error}</div>`}
                    ${sTools.length > 0 && html`
                      <div class="mcp-tools-list">
                        ${sTools.map(t => {
                          const isToolExpanded = expandedTool === t.namespaced_name;
                          return html`
                            <div
                              key=${t.namespaced_name}
                              class="mcp-tool-item"
                              onClick=${() => setExpandedTool(isToolExpanded ? null : t.namespaced_name)}
                            >
                              <span class="mcp-tool-name">${t.name}</span>
                              ${t.description && html`<span class="mcp-tool-desc ${isToolExpanded ? 'expanded' : ''}">${t.description}</span>`}
                            </div>
                          `;
                        })}
                      </div>
                    `}
                  `}
                </div>
              `;
            })}
          </div>
          <div class="mcp-add-section">
            ${!showAddForm ? html`
              <button class="mcp-add-toggle" onClick=${() => setShowAddForm(true)}>+ Add Server</button>
            ` : html`
              <form class="mcp-add-form" onSubmit=${handleAddSubmit}>
                <div class="form-group">
                  <label>Name</label>
                  <input class="input" type="text" value=${addName} onInput=${(e) => setAddName(e.target.value)} placeholder="my-server" required />
                </div>
                <div class="form-group">
                  <label>Type</label>
                  <div class="mcp-type-toggle">
                    <button type="button" class="mcp-type-btn ${addType === 'local' ? 'active' : ''}" onClick=${() => setAddType('local')}>Local</button>
                    <button type="button" class="mcp-type-btn ${addType === 'remote' ? 'active' : ''}" onClick=${() => setAddType('remote')}>Remote</button>
                  </div>
                </div>
                ${addType === 'local' ? html`
                  <div class="form-group">
                    <label>Command</label>
                    <input class="input" type="text" value=${addCommand} onInput=${(e) => setAddCommand(e.target.value)} placeholder="npx" required />
                  </div>
                  <div class="form-group">
                    <label>Args (space-separated)</label>
                    <input class="input" type="text" value=${addArgs} onInput=${(e) => setAddArgs(e.target.value)} placeholder="-y @modelcontextprotocol/server-filesystem /tmp" />
                  </div>
                ` : html`
                  <div class="form-group">
                    <label>URL</label>
                    <input class="input" type="text" value=${addUrl} onInput=${(e) => setAddUrl(e.target.value)} placeholder="http://localhost:3000/mcp" required />
                  </div>
                `}
                <div class="form-actions" style="display:flex;gap:6px">
                  <button type="submit" class="btn btn-sm btn-success">Add</button>
                  <button type="button" class="btn btn-sm" onClick=${() => setShowAddForm(false)}>Cancel</button>
                </div>
              </form>
            `}
          </div>
        </div>
      `;
    }

    // ============ SkillsPanel ============
    function SkillsPanel({ skills, loading, error, onRefresh, onLoadDetail }) {
      const [expandedSkill, setExpandedSkill] = useState(null);
      const [skillDetail, setSkillDetail] = useState(null);
      const [detailLoading, setDetailLoading] = useState(false);

      async function toggleSkill(name) {
        if (expandedSkill === name) {
          setExpandedSkill(null);
          setSkillDetail(null);
          return;
        }
        setExpandedSkill(name);
        setSkillDetail(null);
        setDetailLoading(true);
        const detail = await onLoadDetail(name);
        setSkillDetail(detail);
        setDetailLoading(false);
      }

      return html`
        <div class="skills-panel">
          <div class="skills-panel-header">
            <h3>Skills</h3>
            <button class="icon-btn" onClick=${onRefresh} title="Refresh" disabled=${loading}>
              ${loading ? '' : '\u21BB'}
              ${loading && html`<span class="spinner" style="width:14px;height:14px"></span>`}
            </button>
          </div>
          <div class="skills-list">
            ${error && html`<div class="mcp-server-error">${error}</div>`}
            ${!loading && skills.length === 0 && !error && html`
              <div class="observability-empty" style="padding:24px 12px">
                <div class="observability-empty-icon">\u{1F9E0}</div>
                <div class="observability-empty-text">No skills found</div>
              </div>
            `}
            ${loading && skills.length === 0 && html`
              <div class="observability-empty" style="padding:24px 12px">
                <span class="spinner"></span>
                <div class="observability-empty-text" style="margin-top:8px">Loading skills...</div>
              </div>
            `}
            ${skills.map(s => {
              const isExpanded = expandedSkill === s.name;
              return html`
                <div key=${s.name} class="skill-card">
                  <div class="skill-header" onClick=${() => toggleSkill(s.name)}>
                    <span class="skill-chevron ${isExpanded ? 'expanded' : ''}">\u25B6</span>
                    <span class="skill-name">${s.name}</span>
                    <span class="skill-desc-short">${s.description}</span>
                  </div>
                  ${isExpanded && html`
                    <div class="skill-detail">
                      ${detailLoading && html`
                        <div style="display:flex;align-items:center;gap:8px;padding:8px 0">
                          <span class="spinner"></span>
                          <span style="font-size:12px;color:var(--muted)">Loading...</span>
                        </div>
                      `}
                      ${!detailLoading && skillDetail && html`
                        <div class="skill-body" dangerouslySetInnerHTML=${{ __html: renderMd(skillDetail.body) }} />
                        ${skillDetail.files && skillDetail.files.length > 0 && html`
                          <div class="skill-files">
                            <div class="skill-files-title">Associated files</div>
                            ${skillDetail.files.map(f => html`
                              <div key=${f} class="skill-file-item">${f}</div>
                            `)}
                          </div>
                        `}
                      `}
                    </div>
                  `}
                </div>
              `;
            })}
          </div>
        </div>
      `;
    }

    // ============ SettingsPanel ============
    function SettingsPanel({ config, schema, sources, rawProject, rawGlobal, loaded, error, onRefresh }) {
      const [activeTab, setActiveTab] = useState('visual');
      const [rawScope, setRawScope] = useState('project');
      const [editorContent, setEditorContent] = useState('');
      const [saveResult, setSaveResult] = useState(null);
      const [saving, setSaving] = useState(false);

      // Sync editor content when scope or raw data changes
      useEffect(() => {
        setEditorContent(rawScope === 'project' ? (rawProject || '') : (rawGlobal || ''));
        setSaveResult(null);
      }, [rawScope, rawProject, rawGlobal]);

      if (!loaded) {
        return html`<div class="settings-panel"><div class="settings-loading">Loading settings...</div></div>`;
      }

      if (error) {
        return html`<div class="settings-panel"><div class="settings-loading" style="color: #f85149;">${error}</div></div>`;
      }

      function groupFieldsBySection(schemaObj) {
        const groups = {};
        for (const [key, meta] of Object.entries(schemaObj || {})) {
          const parts = key.split('.');
          const section = parts.length > 1 ? parts[0] : 'general';
          if (!groups[section]) groups[section] = [];
          groups[section].push({ ...meta, key });
        }
        return groups;
      }

      function getConfigValue(cfg, key) {
        const parts = key.split('.');
        let cur = cfg;
        for (const p of parts) {
          if (cur == null || typeof cur !== 'object') return undefined;
          cur = cur[p];
        }
        return cur;
      }

      function formatValue(v) {
        if (v === null || v === undefined) return '';
        if (typeof v === 'object') return JSON.stringify(v, null, 2);
        return String(v);
      }

      async function handleSave() {
        setSaving(true);
        setSaveResult(null);
        try {
          await api('/config/raw', {
            method: 'PUT',
            body: JSON.stringify({ scope: rawScope, content: editorContent }),
          });
          setSaveResult({ type: 'success', message: 'Saved. Restart required to apply changes.' });
          onRefresh();
        } catch (e) {
          setSaveResult({ type: 'error', message: e.message || 'Save failed' });
        }
        setSaving(false);
      }

      const sections = groupFieldsBySection(schema);

      return html`
        <div class="settings-panel">
          <div class="settings-header">
            <span class="settings-title">Settings</span>
            <button class="settings-tab ${activeTab === 'visual' ? 'active' : ''}" onClick=${() => setActiveTab('visual')}>Visual</button>
            <button class="settings-tab ${activeTab === 'raw' ? 'active' : ''}" onClick=${() => setActiveTab('raw')}>Raw YAML</button>
            <button class="settings-refresh-btn" onClick=${onRefresh}>Refresh</button>
          </div>

          ${activeTab === 'visual' ? html`
            <div class="settings-tab-content">
              <div class="settings-visual">
                ${Object.entries(sections).map(([section, fields]) => html`
                  <div class="settings-section" key=${section}>
                    <div class="settings-section-title">${section}</div>
                    ${fields.map(field => {
                      const value = getConfigValue(config, field.key);
                      const displayVal = formatValue(value);
                      const isEmpty = value === '' || value === null || value === undefined;
                      return html`
                        <div class="settings-field" key=${field.key}>
                          <div class="settings-field-header">
                            <span class="settings-field-key">${field.key}</span>
                            <div class="settings-field-badges">
                              ${field.sensitive && html`<span class="settings-badge sensitive">sensitive</span>`}
                            </div>
                          </div>
                          <div class="settings-field-desc">
                            ${field.description}
                            ${field.choices ? html` <span style="opacity:0.7">(${field.choices.join(' | ')})</span>` : ''}
                          </div>
                          <div class="settings-field-value ${isEmpty ? 'empty' : ''}">${isEmpty ? '(not set)' : displayVal}</div>
                        </div>
                      `;
                    })}
                  </div>
                `)}

                ${sources && sources.length > 0 && html`
                  <${ConfigSources} sources=${sources} />
                `}
              </div>
            </div>
          ` : html`
            <div class="settings-tab-content">
              <div class="settings-raw">
                <div class="settings-raw-toolbar">
                  <div class="settings-scope-toggle">
                    <button class="settings-scope-btn ${rawScope === 'project' ? 'active' : ''}" onClick=${() => setRawScope('project')}>Project</button>
                    <button class="settings-scope-btn ${rawScope === 'global' ? 'active' : ''}" onClick=${() => setRawScope('global')}>Global</button>
                  </div>
                  <button class="settings-save-btn" onClick=${handleSave} disabled=${saving}>${saving ? 'Saving...' : 'Save'}</button>
                </div>
                ${saveResult && html`
                  <div class="settings-save-result ${saveResult.type}">${saveResult.message}</div>
                `}
                <textarea
                  class="settings-editor"
                  value=${editorContent}
                  onInput=${e => { setEditorContent(e.target.value); setSaveResult(null); }}
                  spellcheck="false"
                  placeholder="# No config file found. Edit and save to create one."
                />
                ${sources && sources.length > 0 && html`
                  <${ConfigSources} sources=${sources} />
                `}
              </div>
            </div>
          `}
        </div>
      `;
    }

    function ConfigSources({ sources }) {
      return html`
        <div class="settings-sources">
          <div class="settings-sources-title">Config file chain</div>
          ${sources.map(s => html`
            <div class="settings-source-item" key=${s.path}>
              <span class="settings-source-scope">${s.scope}</span>
              <span class="settings-source-path" title=${s.path}>${s.path}</span>
              <span class="settings-source-status ${s.loaded ? 'loaded' : 'missing'}">
                ${s.loaded ? 'loaded' : s.exists ? 'empty' : 'not found'}
              </span>
            </div>
          `)}
        </div>
      `;
    }

    // ============ ChannelsPanel ============
    function ChannelsPanel() {
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [busy, setBusy] = useState({ connect: false, disconnect: false, test: false });
      const [error, setError] = useState('');
      const [saveMsg, setSaveMsg] = useState('');
      const [statusData, setStatusData] = useState(null);
      const [configData, setConfigData] = useState(null);
      const [testResult, setTestResult] = useState(null);
      const [form, setForm] = useState({
        enabled: false,
        app_id: '',
        app_secret: '',
        encrypt_key: '',
        verification_token: '',
        allow_from_text: '',
        permission_mode: 'deny',
        allowed_bash_commands_text: '',
      });

      async function loadChannelsData() {
        setLoading(true);
        setError('');
        try {
          const [status, cfg] = await Promise.all([
            api('/channels/status'),
            api('/channels/config'),
          ]);
          setStatusData(status);
          setConfigData(cfg);

          const feishu = (cfg.channels && cfg.channels.feishu) || {};
          setForm(prev => ({
            ...prev,
            enabled: Boolean(feishu.enabled),
            app_id: feishu.app_id || '',
            app_secret: '',
            encrypt_key: '',
            verification_token: '',
            allow_from_text: (feishu.allow_from || []).join('\n'),
            permission_mode: feishu.permission_mode || 'deny',
            allowed_bash_commands_text: (feishu.allowed_bash_commands || []).join('\n'),
          }));
        } catch (e) {
          setError('Failed to load channels: ' + e.message);
        } finally {
          setLoading(false);
        }
      }

      useEffect(() => {
        loadChannelsData();
      }, []);

      function updateField(key, value) {
        setForm(prev => ({ ...prev, [key]: value }));
        setSaveMsg('');
      }

      async function handleSaveConfig(e) {
        e.preventDefault();
        setSaving(true);
        setSaveMsg('');
        setError('');
        try {
          const allowFrom = form.allow_from_text
            .split('\n')
            .map(x => x.trim())
            .filter(Boolean);
          const allowedBashCommands = form.allowed_bash_commands_text
            .split('\n')
            .map(x => x.trim())
            .filter(Boolean);

          const payload = {
            enabled: form.enabled,
            app_id: form.app_id.trim(),
            app_secret: form.app_secret,
            encrypt_key: form.encrypt_key,
            verification_token: form.verification_token,
            allow_from: allowFrom,
            permission_mode: form.permission_mode,
            allowed_bash_commands: allowedBashCommands,
            keep_existing_secret: true,
          };
          const data = await api('/channels/config/feishu', {
            method: 'PUT',
            body: JSON.stringify(payload),
          });

          setConfigData({ channels: data.channels || {} });
          setStatusData(prev => ({
            ...(prev || {}),
            channels: data.runtime_status || ((prev && prev.channels) || {}),
            enabled_channels: Object.keys(data.runtime_status || {}).filter(k => data.runtime_status[k].enabled),
          }));
          setForm(prev => ({
            ...prev,
            app_secret: '',
            encrypt_key: '',
            verification_token: '',
          }));
          setSaveMsg('Saved and applied.');
        } catch (e) {
          setError('Failed to save channel config: ' + e.message);
        } finally {
          setSaving(false);
        }
      }

      async function connectChannel() {
        setBusy(prev => ({ ...prev, connect: true }));
        setError('');
        try {
          await api('/channels/feishu/connect', { method: 'POST' });
          await loadChannelsData();
        } catch (e) {
          setError('Connect failed: ' + e.message);
        } finally {
          setBusy(prev => ({ ...prev, connect: false }));
        }
      }

      async function disconnectChannel() {
        setBusy(prev => ({ ...prev, disconnect: true }));
        setError('');
        try {
          await api('/channels/feishu/disconnect', { method: 'POST' });
          await loadChannelsData();
        } catch (e) {
          setError('Disconnect failed: ' + e.message);
        } finally {
          setBusy(prev => ({ ...prev, disconnect: false }));
        }
      }

      async function testConnection() {
        setBusy(prev => ({ ...prev, test: true }));
        setError('');
        setTestResult(null);
        try {
          const result = await api('/channels/feishu/test', { method: 'POST' });
          setTestResult(result);
        } catch (e) {
          setError('Connection test failed: ' + e.message);
        } finally {
          setBusy(prev => ({ ...prev, test: false }));
        }
      }

      const feishuCfg = (configData && configData.channels && configData.channels.feishu) || {};
      const feishuStatus = (statusData && statusData.channels && statusData.channels.feishu) || null;
      const enabledCount = statusData ? (statusData.enabled_channels || []).length : 0;
      const runningCount = statusData
        ? Object.values(statusData.channels || {}).filter(v => v && v.running).length
        : 0;

      if (loading) {
        return html`
          <div class="channels-page">
            <div class="channels-loading"><span class="spinner"></span> Loading channel dashboard...</div>
          </div>
        `;
      }

      return html`
        <div class="channels-page">
          <div class="channels-header">
            <div>
              <h2>Channels</h2>
              <p>Configure and manage IM/Email channel adapters.</p>
            </div>
            <button class="btn btn-sm" onClick=${loadChannelsData}>Refresh</button>
          </div>

          <div class="channels-overview">
            <div class="channels-stat-card">
              <div class="channels-stat-label">Enabled Channels</div>
              <div class="channels-stat-value">${enabledCount}</div>
            </div>
            <div class="channels-stat-card">
              <div class="channels-stat-label">Running Channels</div>
              <div class="channels-stat-value">${runningCount}</div>
            </div>
            <div class="channels-stat-card">
              <div class="channels-stat-label">Bridge</div>
              <div class="channels-stat-value">${statusData && statusData.bridge_running ? 'running' : 'stopped'}</div>
            </div>
            <div class="channels-stat-card">
              <div class="channels-stat-label">Queue</div>
              <div class="channels-stat-value">
                in ${statusData && statusData.queue ? statusData.queue.inbound : 0} / out ${statusData && statusData.queue ? statusData.queue.outbound : 0}
              </div>
            </div>
          </div>

          ${(error || saveMsg) && html`
            <div class="channels-banner ${error ? 'error' : 'success'}">
              ${error || saveMsg}
            </div>
          `}

          <div class="channels-grid">
            <div class="channels-card">
              <div class="channels-card-header">
                <h3>Feishu Config</h3>
                <span class="badge ${form.enabled ? 'badge-success' : ''}">${form.enabled ? 'enabled' : 'disabled'}</span>
              </div>
              <form class="channels-form" onSubmit=${handleSaveConfig}>
                <label class="toggle">
                  <input
                    type="checkbox"
                    checked=${form.enabled}
                    onChange=${(e) => updateField('enabled', e.target.checked)}
                  />
                  Enable Feishu channel
                </label>
                <div class="form-group">
                  <label>App ID</label>
                  <input
                    class="input"
                    type="text"
                    value=${form.app_id}
                    onInput=${(e) => updateField('app_id', e.target.value)}
                    placeholder="cli_xxx"
                  />
                </div>
                <div class="form-group">
                  <label>App Secret</label>
                  <input
                    class="input"
                    type="password"
                    value=${form.app_secret}
                    onInput=${(e) => updateField('app_secret', e.target.value)}
                    placeholder=${feishuCfg.app_secret_set ? 'configured (leave blank to keep)' : 'app secret'}
                  />
                </div>
                <div class="form-group">
                  <label>Encrypt Key</label>
                  <input
                    class="input"
                    type="password"
                    value=${form.encrypt_key}
                    onInput=${(e) => updateField('encrypt_key', e.target.value)}
                    placeholder=${feishuCfg.encrypt_key_set ? 'configured (leave blank to keep)' : 'optional'}
                  />
                </div>
                <div class="form-group">
                  <label>Verification Token</label>
                  <input
                    class="input"
                    type="password"
                    value=${form.verification_token}
                    onInput=${(e) => updateField('verification_token', e.target.value)}
                    placeholder=${feishuCfg.verification_token_set ? 'configured (leave blank to keep)' : 'optional'}
                  />
                </div>
                <div class="form-group">
                  <label>Allow From (open_id, one per line)</label>
                  <textarea
                    class="channels-textarea"
                    value=${form.allow_from_text}
                    onInput=${(e) => updateField('allow_from_text', e.target.value)}
                    placeholder="ou_xxx"
                  />
                </div>
                <div class="form-group">
                  <label>Permission Mode</label>
                  <select
                    class="input"
                    value=${form.permission_mode}
                    onChange=${(e) => updateField('permission_mode', e.target.value)}
                  >
                    <option value="deny">Deny all tools (safe default)</option>
                    <option value="allow">Allow all tools</option>
                    <option value="commands">Allow only listed bash commands</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Allowed Bash Commands (one fnmatch pattern per line)</label>
                  <textarea
                    class="channels-textarea"
                    value=${form.allowed_bash_commands_text}
                    onInput=${(e) => updateField('allowed_bash_commands_text', e.target.value)}
                    placeholder="git status&#10;ls *&#10;pytest tests/test_api.py"
                    disabled=${form.permission_mode !== 'commands'}
                  />
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn" disabled=${saving}>
                    ${saving ? 'Saving...' : 'Save Config'}
                  </button>
                </div>
              </form>
            </div>

            <div class="channels-card">
              <div class="channels-card-header">
                <h3>Feishu Runtime</h3>
                ${feishuStatus
                  ? html`<span class="badge ${feishuStatus.running ? 'badge-success' : 'badge-warning'}">
                    ${feishuStatus.running ? 'running' : 'stopped'}
                  </span>`
                  : html`<span class="badge">not initialized</span>`
                }
              </div>

              <div class="channels-runtime-row">
                <span>Configured:</span>
                <strong>${feishuCfg.enabled ? 'yes' : 'no'}</strong>
              </div>
              <div class="channels-runtime-row">
                <span>App ID:</span>
                <strong>${feishuCfg.app_id || '-'}</strong>
              </div>
              <div class="channels-runtime-row">
                <span>Allow List:</span>
                <strong>${(feishuCfg.allow_from || []).length}</strong>
              </div>
              <div class="channels-runtime-row">
                <span>Permission Mode:</span>
                <strong>${feishuCfg.permission_mode || 'deny'}</strong>
              </div>
              <div class="channels-runtime-row">
                <span>Allowed Bash Patterns:</span>
                <strong>${(feishuCfg.allowed_bash_commands || []).length}</strong>
              </div>

              <div class="channels-actions">
                <button class="btn btn-sm btn-success" onClick=${connectChannel} disabled=${busy.connect}>
                  ${busy.connect ? 'Connecting...' : 'Connect'}
                </button>
                <button class="btn btn-sm btn-danger" onClick=${disconnectChannel} disabled=${busy.disconnect}>
                  ${busy.disconnect ? 'Disconnecting...' : 'Disconnect'}

                <button class="btn btn-sm" onClick=${testConnection} disabled=${busy.test}>
                  ${busy.test ? 'Testing...' : 'Connection Test'}
                </button>
              </div>

              ${testResult && html`
                <div class="channels-test-result ${testResult.ok ? 'success' : 'error'}">
                  <div class="channels-test-title">${testResult.ok ? 'Test Passed' : 'Test Failed'}</div>
                  <div class="channels-test-message">${testResult.message || ''}</div>
                  <pre class="channels-test-raw">${JSON.stringify(testResult, null, 2)}</pre>

            </div>
          </div>
        </div>
      `;
    }

    // ============ CronJobsPanel ============
    function CronJobsPanel({ sessions, activeSessionId }) {
      const [loading, setLoading] = useState(true);
      const [refreshing, setRefreshing] = useState(false);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState('');
      const [banner, setBanner] = useState('');
      const [jobs, setJobs] = useState([]);
      const [status, setStatus] = useState(null);
      const [selectedJobId, setSelectedJobId] = useState('');
      const [runsLoading, setRunsLoading] = useState(false);
      const [runs, setRuns] = useState([]);
      const [jobAction, setJobAction] = useState({ id: '', type: '' });
      const [filterSessionId, setFilterSessionId] = useState('');
      const [form, setForm] = useState({
        name: '',
        session_id: '',
        message: '',
        kind: 'every',
        at_local: '',
        every_ms: 3600000,
        expr: '0 * * * *',
        tz: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
        enabled: true,
        delete_after_run: false,
      });

      useEffect(() => {
        const sid = activeSessionId || (sessions.length > 0 ? sessions[0].id : '');
        if (!sid) return;
        setForm(prev => (prev.session_id ? prev : { ...prev, session_id: sid }));
      }, [activeSessionId, sessions]);

      useEffect(() => {
        refreshAll();
      }, []);

      useEffect(() => {
        if (!selectedJobId) {
          setRuns([]);
          return;
        }
        loadRuns(selectedJobId);
      }, [selectedJobId]);

      function updateForm(key, value) {
        setForm(prev => ({ ...prev, [key]: value }));
        setBanner('');
      }

      function normalizeEveryMs(text) {
        const n = Number(text);
        if (!Number.isFinite(n)) return 0;
        return Math.floor(n);
      }

      function localInputToMs(localInput) {
        if (!localInput || !localInput.trim()) return null;
        const ts = Date.parse(localInput);
        if (Number.isNaN(ts)) return null;
        return ts;
      }

      function scheduleLabel(job) {
        if (!job || !job.schedule) return '-';
        const s = job.schedule;
        if (s.kind === 'at') {
          return s.at_ms ? ('at ' + formatDateTime(s.at_ms)) : 'at (invalid)';
        }
        if (s.kind === 'every') {
          if (!s.every_ms) return 'every (invalid)';
          const ms = Number(s.every_ms);
          if (ms % 3600000 === 0) return 'every ' + (ms / 3600000) + 'h';
          if (ms % 60000 === 0) return 'every ' + (ms / 60000) + 'm';
          if (ms % 1000 === 0) return 'every ' + (ms / 1000) + 's';
          return 'every ' + ms + 'ms';
        }
        return 'cron ' + (s.expr || '') + (s.tz ? (' (' + s.tz + ')') : '');
      }

      function selectedSessionOptions() {
        return sessions || [];
      }

      async function refreshAll(opts = {}) {
        const silent = Boolean(opts.silent);
        const sessionId = Object.prototype.hasOwnProperty.call(opts, 'sessionId') ? opts.sessionId : filterSessionId;
        if (silent) setRefreshing(true);
        else setLoading(true);
        setError('');
        try {
          const query = new URLSearchParams();
          query.set('include_disabled', 'true');
          if (sessionId) query.set('session_id', sessionId);
          const [jobsData, statusData] = await Promise.all([
            api('/cronjobs?' + query.toString()),
            api('/cronjobs/status'),
          ]);
          const list = jobsData.jobs || [];
          setJobs(list);
          setStatus(statusData || null);

          if (selectedJobId && !list.some(j => j.id === selectedJobId)) {
            setSelectedJobId('');
          } else if (!selectedJobId && list.length > 0) {
            setSelectedJobId(list[0].id);
          }
        } catch (e) {
          setError('Failed to load cron jobs: ' + e.message);
        } finally {
          if (silent) setRefreshing(false);
          else setLoading(false);
        }
      }

      async function loadRuns(jobId) {
        if (!jobId) return;
        setRunsLoading(true);
        try {
          const data = await api('/cronjobs/' + encodeURIComponent(jobId) + '/runs?limit=30');
          setRuns(data.runs || []);
        } catch (e) {
          setRuns([]);
        } finally {
          setRunsLoading(false);
        }
      }

      async function handleCreateJob(e) {
        e.preventDefault();
        setSaving(true);
        setError('');
        setBanner('');
        try {
          const name = (form.name || '').trim();
          const message = (form.message || '').trim();
          const sessionId = (form.session_id || '').trim();
          if (!name || !message || !sessionId) {
            throw new Error('Name, session and message are required.');
          }

          const schedule = { kind: form.kind };
          if (form.kind === 'at') {
            const atMs = localInputToMs(form.at_local);
            if (!atMs) throw new Error('Please provide a valid date/time for one-shot schedule.');
            schedule.at_ms = atMs;
          } else if (form.kind === 'every') {
            const everyMs = normalizeEveryMs(form.every_ms);
            if (!everyMs || everyMs <= 0) throw new Error('Please provide a positive interval in milliseconds.');
            schedule.every_ms = everyMs;
          } else if (form.kind === 'cron') {
            const expr = (form.expr || '').trim();
            if (!expr) throw new Error('Please provide cron expression.');
            schedule.expr = expr;
            if ((form.tz || '').trim()) schedule.tz = form.tz.trim();
          }

          const created = await api('/cronjobs', {
            method: 'POST',
            body: JSON.stringify({
              name: name,
              session_id: sessionId,
              message: message,
              schedule: schedule,
              enabled: Boolean(form.enabled),
              delete_after_run: Boolean(form.delete_after_run),
            }),
          });
          setBanner('Cron job created.');
          setForm(prev => ({
            ...prev,
            name: '',
            message: '',
            at_local: '',
          }));
          setSelectedJobId(created.id || '');
          await refreshAll({ silent: true });
        } catch (e) {
          setError('Failed to create cron job: ' + e.message);
        } finally {
          setSaving(false);
        }
      }

      async function handleToggleEnabled(job) {
        if (!job || !job.id) return;
        const nextEnabled = !job.enabled;
        setJobAction({ id: job.id, type: 'toggle' });
        setError('');
        setBanner('');
        try {
          await api('/cronjobs/' + encodeURIComponent(job.id) + '/enabled', {
            method: 'POST',
            body: JSON.stringify({ enabled: nextEnabled }),
          });
          setBanner(nextEnabled ? 'Cron job enabled.' : 'Cron job disabled.');
          await refreshAll({ silent: true });
          if (selectedJobId === job.id) await loadRuns(job.id);
        } catch (e) {
          setError('Failed to update job state: ' + e.message);
        } finally {
          setJobAction({ id: '', type: '' });
        }
      }

      async function handleRunNow(job) {
        if (!job || !job.id) return;
        setJobAction({ id: job.id, type: 'run' });
        setError('');
        setBanner('');
        try {
          await api('/cronjobs/' + encodeURIComponent(job.id) + '/run', {
            method: 'POST',
            body: JSON.stringify({ force: true }),
          });
          setBanner('Cron job triggered.');
          await refreshAll({ silent: true });
          if (selectedJobId === job.id) await loadRuns(job.id);
        } catch (e) {
          setError('Failed to run job: ' + e.message);
        } finally {
          setJobAction({ id: '', type: '' });
        }
      }

      async function handleDelete(job) {
        if (!job || !job.id) return;
        const ok = window.confirm('Delete cron job "' + (job.name || job.id) + '"?');
        if (!ok) return;

        setJobAction({ id: job.id, type: 'delete' });
        setError('');
        setBanner('');
        try {
          await api('/cronjobs/' + encodeURIComponent(job.id), { method: 'DELETE' });
          setBanner('Cron job deleted.');
          if (selectedJobId === job.id) {
            setSelectedJobId('');
            setRuns([]);
          }
          await refreshAll({ silent: true });
        } catch (e) {
          setError('Failed to delete job: ' + e.message);
        } finally {
          setJobAction({ id: '', type: '' });
        }
      }

      const enabledJobs = jobs.filter(j => j.enabled).length;
      const selectedJob = jobs.find(j => j.id === selectedJobId) || null;

      if (loading) {
        return html`
          <div class="cronjobs-page">
            <div class="cronjobs-loading"><span class="spinner"></span> Loading cronjobs...</div>
          </div>
        `;
      }

      return html`
        <div class="cronjobs-page">
          <div class="cronjobs-header">
            <div>
              <h2>Cron Jobs</h2>
              <p>Schedule periodic wakeups to inject a message into a session and run the agent loop.</p>
            </div>
            <div class="cronjobs-header-actions">
              <button class="btn btn-sm" onClick=${() => refreshAll({ silent: true })} disabled=${refreshing}>
                ${refreshing ? 'Refreshing...' : 'Refresh'}
              </button>
            </div>
          </div>

          <div class="cronjobs-overview">
            <div class="cronjobs-stat-card">
              <div class="cronjobs-stat-label">Service</div>
              <div class="cronjobs-stat-value">${status && status.running ? 'running' : 'stopped'}</div>
            </div>
            <div class="cronjobs-stat-card">
              <div class="cronjobs-stat-label">Total Jobs</div>
              <div class="cronjobs-stat-value">${jobs.length}</div>
            </div>
            <div class="cronjobs-stat-card">
              <div class="cronjobs-stat-label">Enabled Jobs</div>
              <div class="cronjobs-stat-value">${enabledJobs}</div>
            </div>
            <div class="cronjobs-stat-card">
              <div class="cronjobs-stat-label">Next Wake</div>
              <div class="cronjobs-stat-value cronjobs-stat-time">
                ${status && status.next_wake_at_ms ? formatDateTime(status.next_wake_at_ms) : '-'}
              </div>
            </div>
          </div>

          ${(error || banner) && html`
            <div class="cronjobs-banner ${error ? 'error' : 'success'}">${error || banner}</div>
          `}

          <div class="cronjobs-grid">
            <div class="cronjobs-card">
              <div class="cronjobs-card-header">
                <h3>Create Cron Job</h3>
                <span class="badge">agent_turn</span>
              </div>
              <form class="cronjobs-form" onSubmit=${handleCreateJob}>
                <div class="form-group">
                  <label>Name</label>
                  <input
                    class="input"
                    type="text"
                    value=${form.name}
                    onInput=${(e) => updateForm('name', e.target.value)}
                    placeholder="hourly-summary"
                    required
                  />
                </div>
                <div class="form-group">
