    // ============ KnowledgePanel ============
    function KnowledgePanel({ config }) {
      const [activeTab, setActiveTab] = useState('documents');

      // Lift upload state so it persists across tab switches
      const uploadState = useRef({
        // Text mode
        mode: 'text',
        text: '',
        fileSource: '',
        // File mode
        useVlm: false,
        // Shared operation tracking
        uploading: false,
        result: null,
        error: '',
        startTime: null,
        elapsed: null,
        // VLM states
        vlmState: 'idle',
        vlmMarkdown: '',
        vlmError: '',
        vlmFileName: '',
        vlmJobId: null,
        // Direct file upload
        fileName: '',
        // Upload history: [{fileName, status, elapsed, result, error, ts}]
        history: [],
      });
      // A counter to force re-render when uploadState changes
      const [uploadTick, setUploadTick] = useState(0);
      function patchUpload(patch) {
        Object.assign(uploadState.current, patch);
        setUploadTick(t => t + 1);
      }

      // Recover in-progress VLM job from sessionStorage on mount
      useEffect(() => {
        try {
          const saved = sessionStorage.getItem('kb_vlm_job');
          if (!saved) return;
          const job = JSON.parse(saved);
          if (job && job.jobId && job.state === 'parsing') {
            patchUpload({
              vlmState: 'parsing',
              vlmJobId: job.jobId,
              vlmFileName: job.fileName || '',
              startTime: job.startTime || Date.now(),
              elapsed: null,
              error: '',
              vlmError: '',
            });
            // Resume polling
            resumeVlmPoll(job.jobId, job.startTime || Date.now());
          }
        } catch (_) {}
      }, []);

      async function resumeVlmPoll(jobId, startTime) {
        try {
          // Poll VLM parse status by re-calling the SSE endpoint won't work (job already submitted).
          // Instead, periodically poll the backend to check completion.
          // Since our backend only exposes SSE stream, we use a simple retry via /kb/vlm/status
          // However we don't have that endpoint — so we wait for the existing async stream.
          // For now, show a "reconnecting" state. The user can re-upload if the job was lost.
          // Clear sessionStorage since we can't actually resume an SSE stream.
          sessionStorage.removeItem('kb_vlm_job');
          patchUpload({
            vlmState: 'idle',
            vlmError: 'VLM parsing was interrupted (page refresh). Please re-upload the file.',
            startTime: null,
            elapsed: null,
          });
        } catch (_) {}
      }

      if (!config) {
        return html`
          <div class="knowledge-panel">
            <div class="kb-empty">
              <span class="spinner"></span>
              <div class="kb-empty-text" style="margin-top:8px">Loading KB config...</div>
            </div>
          </div>
        `;
      }

      if (!config.enabled) {
        return html`
          <div class="knowledge-panel">
            <div class="kb-empty">
              <div class="kb-empty-icon">\u{1F4DA}</div>
              <div class="kb-empty-text">Knowledge Base is not configured</div>
              <div style="font-size:11px;color:var(--muted);margin-top:8px">
                Set CHORDCODE_KB_BASE_URL in .env to enable.
              </div>
            </div>
          </div>
        `;
      }

      // Show activity indicator on upload tab when busy
      const uploadBusy = uploadState.current.uploading || uploadState.current.vlmState === 'parsing';

      return html`
        <div class="knowledge-panel">
          <div class="kb-tabs">
            <button class="kb-tab ${activeTab === 'documents' ? 'active' : ''}" onClick=${() => setActiveTab('documents')}>Documents</button>
            <button class="kb-tab ${activeTab === 'upload' ? 'active' : ''}" onClick=${() => setActiveTab('upload')}>
              Upload${uploadBusy ? html`<span class="kb-tab-indicator"></span>` : ''}
            </button>
            <button class="kb-tab ${activeTab === 'search' ? 'active' : ''}" onClick=${() => setActiveTab('search')}>Search</button>
          </div>
          <div class="kb-tab-content">
            ${activeTab === 'documents' && html`<${KBDocumentsTab} />`}
            <div style=${activeTab === 'upload' ? '' : 'display:none'}>
              <${KBUploadTab}
                vlmAvailable=${config.vlm_available}
                us=${uploadState.current}
                patchUpload=${patchUpload}
              />
            </div>
            ${activeTab === 'search' && html`<${KBSearchTab} />`}
          </div>
        </div>
      `;
    }

    // ============ KBDocumentsTab ============
    function KBDocumentsTab() {
      const [documents, setDocuments] = useState([]);
      const [page, setPage] = useState(1);
      const [pageSize] = useState(20);
      const [totalCount, setTotalCount] = useState(0);
      const [totalPages, setTotalPages] = useState(0);
      const [statusFilter, setStatusFilter] = useState('');
      const [statusCounts, setStatusCounts] = useState({});
      const [pipeline, setPipeline] = useState(null);
      const [loading, setLoading] = useState(false);
      const [selected, setSelected] = useState(new Set());
      const [deleting, setDeleting] = useState(false);
      const [warning, setWarning] = useState(null);

      async function loadDocuments(p, filter) {
        setLoading(true);
        try {
          const body = { page: p, page_size: pageSize };
          if (filter) body.status_filter = filter;
          const data = await api('/kb/documents/list', {
            method: 'POST',
            body: JSON.stringify(body),
          });
          setDocuments(data.documents || []);
          setPage(data.page || p);
          setTotalCount(data.total_count || 0);
          setTotalPages(data.total_pages || 0);
          setWarning(data.warning || null);
        } catch (e) {
          console.error('KB docs error:', e);
        } finally {
          setLoading(false);
        }
      }

      async function loadCounts() {
        try {
          const data = await api('/kb/status_counts');
          setStatusCounts(data.counts || {});
        } catch (e) { /* ignore */ }
      }

      async function loadPipeline() {
        try {
          const data = await api('/kb/pipeline/status');
          setPipeline(data);
        } catch (e) { /* ignore */ }
      }

      useEffect(() => {
        loadDocuments(1, '');
        loadCounts();
        loadPipeline();
      }, []);

      function handleFilterChange(e) {
        const f = e.target.value;
        setStatusFilter(f);
        setSelected(new Set());
        loadDocuments(1, f);
      }

      function toggleSelect(id) {
        setSelected(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      }

      function toggleSelectAll() {
        if (selected.size === documents.length) {
          setSelected(new Set());
        } else {
          setSelected(new Set(documents.map(d => d.id)));
        }
      }

      async function handleDelete() {
        if (selected.size === 0) return;
        if (!window.confirm('Delete ' + selected.size + ' document(s)?')) return;
        setDeleting(true);
        try {
          await api('/kb/documents', {
            method: 'DELETE',
            body: JSON.stringify({ doc_ids: Array.from(selected) }),
          });
          setSelected(new Set());
          await loadDocuments(page, statusFilter);
          await loadCounts();
        } catch (e) {
          alert('Delete failed: ' + e.message);
        } finally {
          setDeleting(false);
        }
      }

      function refresh() {
        loadDocuments(page, statusFilter);
        loadCounts();
        loadPipeline();
      }

      return html`
        <div>
          ${pipeline && pipeline.busy && html`
            <div class="kb-pipeline kb-pipeline-busy">
              <span class="spinner" style="width:14px;height:14px"></span>
              Pipeline busy: ${pipeline.job_name || 'processing'}
              ${pipeline.docs_current != null && pipeline.docs_total != null
                ? ' (' + pipeline.docs_current + '/' + pipeline.docs_total + ')'
                : ''}
            </div>
          `}

          <div class="kb-status-bar">
            ${Object.entries(statusCounts).map(([status, count]) => html`
              <div key=${status} class="kb-status-item">
                <span class="kb-status ${status.toLowerCase()}">${status}</span>
                <span class="kb-status-count">${count}</span>
              </div>
            `)}
          </div>

          ${warning && html`
            <div class="kb-warning" style="display:flex;align-items:center;gap:8px;padding:8px 12px;margin-bottom:12px;background:rgba(187,128,9,0.1);border:1px solid rgba(187,128,9,0.3);border-radius:6px;font-size:12px;color:#d29922;">
              <span style="flex-shrink:0">&#x26A0;</span>
              <span>${warning}</span>
            </div>
          `}

          <div class="kb-toolbar">
            <div class="kb-toolbar-left">
              <select class="kb-filter-select" value=${statusFilter} onChange=${handleFilterChange}>
                <option value="">All statuses</option>
                <option value="pending">pending</option>
                <option value="processing">processing</option>
                <option value="processed">processed</option>
                <option value="failed">failed</option>
              </select>
              <button class="btn btn-sm btn-danger" onClick=${handleDelete} disabled=${selected.size === 0 || deleting}>
                ${deleting ? 'Deleting...' : 'Delete (' + selected.size + ')'}
              </button>
            </div>
            <button class="icon-btn" onClick=${refresh} title="Refresh" disabled=${loading}>
              ${loading ? '' : '\u21BB'}
              ${loading && html`<span class="spinner" style="width:14px;height:14px"></span>`}
            </button>
          </div>

          ${loading && documents.length === 0 && html`
            <div class="kb-empty">
              <span class="spinner"></span>
              <div class="kb-empty-text" style="margin-top:8px">Loading documents...</div>
            </div>
          `}

          ${!loading && documents.length === 0 && html`
            <div class="kb-empty">
              <div class="kb-empty-icon">\u{1F4C4}</div>
              <div class="kb-empty-text">No documents found</div>
            </div>
          `}

          ${documents.length > 0 && html`
            <table class="kb-doc-table">
              <thead>
                <tr>
                  <th class="doc-checkbox">
                    <input type="checkbox"
                      checked=${selected.size === documents.length && documents.length > 0}
                      onChange=${toggleSelectAll}
                    />
                  </th>
                  <th>Status</th>
                  <th>Summary</th>
                  <th>Length</th>
                  <th>Chunks</th>
                  <th>Source</th>
                  <th>Updated</th>
                </tr>
              </thead>
              <tbody>
                ${documents.map(doc => html`
                  <tr key=${doc.id}>
                    <td class="doc-checkbox">
                      <input type="checkbox"
                        checked=${selected.has(doc.id)}
                        onChange=${() => toggleSelect(doc.id)}

                    </td>
                    <td><span class="kb-status ${doc.status.toLowerCase()}">${doc.status}</span></td>
                    <td class="doc-summary" title=${doc.content_summary}>${doc.content_summary}</td>
                    <td>${doc.content_length}</td>
                    <td>${doc.chunks_count != null ? doc.chunks_count : '-'}</td>
                    <td>${doc.file_path || '-'}</td>
                    <td>${doc.updated_at || doc.created_at || '-'}</td>
                  </tr>
                `)}
              </tbody>
            </table>

            <div class="kb-pagination">
              <span>Page ${page} of ${totalPages} (${totalCount} total)</span>
              <div style="display:flex;gap:6px">
                <button class="btn btn-sm" onClick=${() => loadDocuments(page - 1, statusFilter)} disabled=${page <= 1 || loading}>Prev</button>
                <button class="btn btn-sm" onClick=${() => loadDocuments(page + 1, statusFilter)} disabled=${page >= totalPages || loading}>Next</button>
              </div>
            </div>
          `}
        </div>
      `;
    }

    // ============ KBUploadTab ============
    function KBUploadTab({ vlmAvailable, us, patchUpload }) {
      // Live elapsed-time ticker: updates every second while an operation is running
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        if (!us.startTime) return;
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, [us.startTime]);

      function fmtElapsed(ms) {
        if (!ms || ms < 0) return '0s';
        const s = Math.floor(ms / 1000);
        if (s < 60) return s + 's';
        const m = Math.floor(s / 60);
        return m + 'm ' + (s % 60) + 's';
      }

      const liveElapsed = us.startTime ? (us.elapsed || (now - us.startTime)) : null;

      // Helper: add completed/failed entry to upload history
      function pushHistory(entry) {
        const hist = [...(us.history || []), { ...entry, ts: Date.now() }];
        // Keep last 20
        if (hist.length > 20) hist.splice(0, hist.length - 20);
        patchUpload({ history: hist });
      }

      // ---- handlers ----

      async function handleTextSubmit(e) {
        e.preventDefault();
        if (!us.text.trim()) return;
        const st = Date.now();
        patchUpload({ uploading: true, error: '', result: null, startTime: st, elapsed: null, fileName: '' });
        try {
          const blob = new Blob([us.text.trim()], { type: 'text/plain' });
          const fname = us.fileSource.trim() || 'manual_input.txt';
          const formData = new FormData();
          formData.append('file', blob, fname);
          const res = await fetch('/kb/documents/upload', { method: 'POST', body: formData });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(err.detail || 'Upload failed');
          }
          const data = await res.json();
          const el = Date.now() - st;
          patchUpload({ result: data, uploading: false, elapsed: el, text: '', fileSource: '' });
          pushHistory({ fileName: us.fileSource.trim() || '(text)', status: data.status, elapsed: el });
        } catch (e) {
          const el = Date.now() - st;
          patchUpload({ error: e.message, uploading: false, elapsed: el });
          pushHistory({ fileName: us.fileSource.trim() || '(text)', status: 'error', error: e.message, elapsed: el });
        }
      }

      async function handleFileUpload(e) {
        e.preventDefault();
        const fileInput = e.target.querySelector('input[type="file"]');
        const file = fileInput && fileInput.files[0];
        if (!file) return;

        if (us.useVlm && vlmAvailable) {
          const st = Date.now();
          patchUpload({ vlmState: 'parsing', vlmError: '', vlmMarkdown: '', vlmFileName: file.name, vlmJobId: null, startTime: st, elapsed: null, result: null, error: '' });

          const formData = new FormData();
          formData.append('file', file);

          try {
            const res = await fetch('/kb/vlm/parse', { method: 'POST', body: formData });
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n');
              buffer = lines.pop() || '';

              for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                  const evt = JSON.parse(line.slice(6));
                  if (evt.state === 'submitted' && evt.job_id) {
                    // Save job to sessionStorage so we can detect interrupted parses
                    patchUpload({ vlmJobId: evt.job_id });
                    try {
                      sessionStorage.setItem('kb_vlm_job', JSON.stringify({
                        jobId: evt.job_id, fileName: file.name, startTime: st, state: 'parsing',
                      }));
                    } catch (_) {}
                  } else if (evt.state === 'done') {
                    sessionStorage.removeItem('kb_vlm_job');
                    patchUpload({ vlmMarkdown: evt.markdown || '', vlmState: 'preview', elapsed: Date.now() - st });
                  } else if (evt.state === 'failed') {
                    sessionStorage.removeItem('kb_vlm_job');
                    const el = Date.now() - st;
                    patchUpload({ vlmError: evt.error || 'Parse failed', vlmState: 'idle', elapsed: el });
                    pushHistory({ fileName: file.name, status: 'error', error: evt.error || 'VLM parse failed', elapsed: el });
                  }
                } catch (_) { /* skip */ }
              }
            }
          } catch (e) {
            sessionStorage.removeItem('kb_vlm_job');
            const el = Date.now() - st;
            patchUpload({ vlmError: e.message, vlmState: 'idle', elapsed: el });
            pushHistory({ fileName: file.name, status: 'error', error: e.message, elapsed: el });
          }
        } else {
          const st = Date.now();
          patchUpload({ uploading: true, error: '', result: null, fileName: file.name, startTime: st, elapsed: null });
          const formData = new FormData();
          formData.append('file', file);
          try {
            const res = await fetch('/kb/documents/upload?use_vlm=false', { method: 'POST', body: formData });
            if (!res.ok) {
              const err = await res.json().catch(() => ({ detail: res.statusText }));
              throw new Error(err.detail || 'Upload failed');
            }
            const data = await res.json();
            const el = Date.now() - st;
            patchUpload({ result: data, uploading: false, elapsed: el });
            pushHistory({ fileName: file.name, status: data.status, elapsed: el });
          } catch (e) {
            const el = Date.now() - st;
            patchUpload({ error: e.message, uploading: false, elapsed: el });
            pushHistory({ fileName: file.name, status: 'error', error: e.message, elapsed: el });
          }
        }
      }

      async function handleInsertParsed() {
        if (!us.vlmMarkdown.trim()) return;
        const insertStart = Date.now();
        patchUpload({ vlmState: 'inserting', startTime: insertStart, elapsed: null });
        try {
          const blob = new Blob([us.vlmMarkdown.trim()], { type: 'text/markdown' });
          const fname = (us.vlmFileName || 'vlm-parsed').replace(/\.[^.]+$/, '') + '.md';
          const formData = new FormData();
          formData.append('file', blob, fname);
          const res = await fetch('/kb/documents/upload', { method: 'POST', body: formData });
          if (!res.ok) {
            const err = await res.json().catch(() => ({ detail: res.statusText }));
            throw new Error(err.detail || 'Upload failed');
          }
          const data = await res.json();
          const el = Date.now() - insertStart;
          patchUpload({ result: data, vlmState: 'idle', vlmMarkdown: '', elapsed: el });
          pushHistory({ fileName: us.vlmFileName || 'vlm-parsed', status: data.status, elapsed: el });
        } catch (e) {
          const el = Date.now() - insertStart;
          patchUpload({ vlmError: e.message, vlmState: 'preview', elapsed: el });
        }
      }

      function handleClear() {
        patchUpload({ result: null, error: '', vlmError: '', elapsed: null, startTime: null, fileName: '', vlmFileName: '' });
      }

      function clearHistory() {
        patchUpload({ history: [] });
      }

      // ---- render ----

      const isWorking = us.uploading || us.vlmState === 'parsing' || us.vlmState === 'inserting';
      const hasOutcome = us.result || us.error || us.vlmError;
      const history = us.history || [];

      return html`
        <div class="kb-upload-section">
          <!-- Mode toggle -->
          <div class="kb-upload-mode-toggle">
            <button class="kb-upload-mode-btn ${us.mode === 'text' ? 'active' : ''}"
              onClick=${() => patchUpload({ mode: 'text' })} disabled=${isWorking}>Text</button>
            <button class="kb-upload-mode-btn ${us.mode === 'file' ? 'active' : ''}"
              onClick=${() => patchUpload({ mode: 'file' })} disabled=${isWorking}>File</button>
          </div>

          <!-- Text mode -->
          ${us.mode === 'text' && html`
            <form class="kb-upload-form" onSubmit=${handleTextSubmit}>
              <div class="form-group">
                <label class="kb-field-label">Source name (optional)</label>
                <input class="input" type="text"
                  value=${us.fileSource}
                  onInput=${(e) => patchUpload({ fileSource: e.target.value })}
                  placeholder="my-document.txt"
                  disabled=${isWorking} />
              </div>
              <textarea
                value=${us.text}
                onInput=${(e) => patchUpload({ text: e.target.value })}
                placeholder="Paste text content here..."
                disabled=${isWorking}
              />
              <div class="form-actions">
                <button type="submit" class="btn" disabled=${!us.text.trim() || isWorking}>
                  ${us.uploading ? 'Inserting...' : 'Insert to KB'}
                </button>
              </div>
            </form>
          `}

          <!-- File mode -->
          ${us.mode === 'file' && html`
            <form class="kb-upload-form" onSubmit=${handleFileUpload}>
              <div class="kb-drop-zone">
                <div class="kb-drop-zone-icon">\u{1F4C1}</div>
                <div class="kb-drop-zone-text">Choose a file to upload</div>
                <input type="file" class="kb-file-real-input" disabled=${isWorking} />
              </div>
              ${vlmAvailable && html`
                <label class="kb-vlm-toggle">
                  <input type="checkbox"
                    checked=${us.useVlm}
                    onChange=${(e) => patchUpload({ useVlm: e.target.checked })}
                    disabled=${isWorking} />
                  VLM Enhanced Parsing (PaddleOCR)
                </label>
              `}
              <div class="form-actions">
                <button type="submit" class="btn" disabled=${isWorking}>
                  ${us.uploading ? 'Uploading...' : us.vlmState === 'parsing' ? 'Parsing...' : 'Upload'}
                </button>
              </div>
            </form>
          `}

          <!-- Activity card: shown during or after operations -->
          ${(isWorking || hasOutcome) && html`
            <div class="kb-activity-card ${us.error || us.vlmError ? 'error' : us.result ? 'success' : 'working'}">
              <div class="kb-activity-header">
                <div class="kb-activity-icon">
                  ${isWorking ? html`<span class="spinner" style="width:16px;height:16px"></span>`
                    : us.error || us.vlmError ? '\u2717'
                    : '\u2713'}
                </div>
                <div class="kb-activity-title">
                  ${us.vlmState === 'parsing' ? 'Parsing with VLM'
                    : us.vlmState === 'inserting' ? 'Inserting parsed text'
                    : us.uploading ? 'Uploading'
                    : us.error || us.vlmError ? 'Failed'
                    : us.result ? 'Completed' : ''}
                </div>
                <div class="kb-activity-meta">
                  ${(us.fileName || us.vlmFileName) && html`
                    <span class="kb-activity-file">${us.vlmFileName || us.fileName}</span>
                  `}
                  ${liveElapsed != null && html`
                    <span class="kb-activity-time">${fmtElapsed(liveElapsed)}</span>
                  `}
                </div>
                ${!isWorking && html`
                  <button class="kb-activity-close" onClick=${handleClear} title="Dismiss">\u2715</button>
                `}
              </div>

              ${us.vlmState === 'parsing' && html`
                <div class="kb-progress-bar">
                  <div class="kb-progress-bar-fill kb-progress-indeterminate"></div>
                </div>
              `}

              ${(us.error || us.vlmError) && html`
                <div class="kb-activity-error">${us.error || us.vlmError}</div>
              `}

              ${us.result && html`
                <div class="kb-activity-result">
                  <span class="kb-status ${us.result.status === 'success' ? 'processed' : 'failed'}">${us.result.status}</span>
                  <span>${us.result.message}</span>
                  ${us.result.track_id && html`<span class="kb-activity-track">ID: ${us.result.track_id}</span>`}
                </div>
              `}
            </div>
          `}

          <!-- VLM preview -->
          ${us.vlmState === 'preview' && html`
            <div class="kb-vlm-preview">
              <div class="kb-vlm-preview-header">
                <span>Parsed markdown preview</span>
                <span class="kb-vlm-preview-hint">You can edit before inserting</span>
              </div>
              <textarea
                value=${us.vlmMarkdown}
                onInput=${(e) => patchUpload({ vlmMarkdown: e.target.value })}
              />
              <div class="form-actions" style="margin-top:8px">
                <button class="btn" onClick=${handleInsertParsed}>Insert to KB</button>
                <button class="btn btn-sm" onClick=${() => patchUpload({ vlmState: 'idle', vlmMarkdown: '', vlmFileName: '', startTime: null, elapsed: null })}>
                  Cancel
                </button>
              </div>
            </div>
          `}

          <!-- Upload history -->
          ${history.length > 0 && html`
            <div class="kb-history">
              <div class="kb-history-header">
                <span class="kb-history-title">Upload History</span>
                <button class="kb-activity-close" onClick=${clearHistory} title="Clear history">\u2715</button>
              </div>
              <div class="kb-history-list">
                ${history.slice().reverse().map((h, i) => html`
                  <div key=${i} class="kb-history-item ${h.status === 'error' ? 'error' : ''}">
                    <span class="kb-history-icon">${h.status === 'error' ? '\u2717' : '\u2713'}</span>
                    <span class="kb-history-name" title=${h.fileName}>${h.fileName}</span>
                    <span class="kb-status ${h.status === 'success' ? 'processed' : h.status === 'error' ? 'failed' : 'pending'}">${h.status}</span>
                    <span class="kb-history-elapsed">${fmtElapsed(h.elapsed)}</span>
                  </div>
                `)}
              </div>
            </div>
          `}
        </div>
      `;
    }

    // ============ KBSearchTab ============
    function KBSearchTab() {
      const [query, setQuery] = useState('');
      const [topK, setTopK] = useState(10);
      const [searching, setSearching] = useState(false);
      const [result, setResult] = useState(null);
      const [error, setError] = useState('');

      async function handleSearch(e) {
        e.preventDefault();
        if (!query.trim()) return;
        setSearching(true);
        setError('');
        setResult(null);
        try {
          const data = await api('/kb/query', {
            method: 'POST',
            body: JSON.stringify({ query: query.trim(), top_k: topK }),
          });
          setResult(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setSearching(false);
        }
      }

      return html`
        <div>
          <form class="kb-search-form" onSubmit=${handleSearch}>
            <div class="form-group">
              <input
                type="text"
                value=${query}
                onInput=${(e) => setQuery(e.target.value)}
                placeholder="Search the knowledge base..."
              />
            </div>
            <div class="form-group" style="max-width:80px">
              <input
                type="number"
                value=${topK}
                onInput=${(e) => setTopK(parseInt(e.target.value) || 10)}
                min="1" max="100"
                title="Top K results"
                style="padding:8px 12px;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--fg)"
              />
            </div>
            <button type="submit" class="btn" disabled=${!query.trim() || searching}>
              ${searching ? 'Searching...' : 'Search'}
            </button>
          </form>

          ${error && html`<div style="color:var(--danger, #f85149);font-size:12px;margin-bottom:12px">${error}</div>`}

          ${!result && !searching && !error && html`
            <div class="kb-empty">
              <div class="kb-empty-icon">\u{1F50D}</div>
              <div class="kb-empty-text">Enter a query to search the knowledge base</div>
            </div>
          `}

          ${searching && html`
            <div class="kb-empty">
              <span class="spinner"></span>
              <div class="kb-empty-text" style="margin-top:8px">Searching...</div>
            </div>
          `}

          ${result && html`
            <div class="kb-results-section">
              ${result.entities && result.entities.length > 0 && html`
                <div class="kb-results-group">
                  <h4>Entities (${result.entities.length})</h4>
                  <div class="kb-entity-list">
                    ${result.entities.map((e, i) => html`
                      <div key=${i} class="kb-entity-tag" title=${e.description || ''}>
                        <strong>${e.entity_name}</strong>
                        ${e.entity_type && html`<span class="kb-entity-type">${e.entity_type}</span>`}
                      </div>
                    `)}
                  </div>
                </div>
              `}

              ${result.relationships && result.relationships.length > 0 && html`
                <div class="kb-results-group">
                  <h4>Relationships (${result.relationships.length})</h4>
                  <div class="kb-relationship-list">
                    ${result.relationships.map((r, i) => html`
                      <div key=${i} class="kb-relationship-row">
                        <span>${r.src_id}</span>
                        <span class="kb-rel-arrow">\u2192</span>
                        <span>${r.tgt_id}</span>
                        ${r.description && html`<span class="kb-rel-desc">${r.description}</span>`}
                      </div>
                    `)}
                  </div>
                </div>
              `}

              ${result.chunks && result.chunks.length > 0 && html`
                <div class="kb-results-group">
                  <h4>Chunks (${result.chunks.length})</h4>
                  <div class="kb-chunk-list">
                    ${result.chunks.map((ch, i) => html`
                      <div key=${i} class="kb-chunk-card">
                        <div class="kb-chunk-header">
                          <span>Chunk ${i + 1}</span>
                          ${ch.file_path && html`<span>${ch.file_path}</span>`}
                        </div>
                        <div class="kb-chunk-content">${ch.content}</div>
                      </div>
                    `)}
                  </div>
                </div>
              `}

              ${(!result.entities || result.entities.length === 0) &&
                (!result.relationships || result.relationships.length === 0) &&
                (!result.chunks || result.chunks.length === 0) && html`
                <div class="kb-empty">
                  <div class="kb-empty-text">No results found for this query.</div>
                </div>
              `}
            </div>
          `}
        </div>
      `;
    }

    // ============ MainContent ============
    function MainContent({ sessionId, messages, parts, partsByMessage, status, permissions }) {
      const [input, setInput] = useState('');
      const [autorun, setAutorun] = useState(true);
      const chatRef = useRef(null);

      const sortedMsgs = useMemo(() => {
        return Array.from(messages.values())
          .filter(m => m.session_id === sessionId && m.role !== 'tool')
          .sort((a, b) => a.created_at - b.created_at);
      }, [messages, sessionId]);

      useEffect(() => {
        if (chatRef.current) {
          chatRef.current.scrollTop = chatRef.current.scrollHeight;
        }
      }, [parts, sortedMsgs.length]);

      async function handleSend(e) {
        e.preventDefault();
        if (!input.trim() || !sessionId) return;

        const text = input.trim();
        setInput('');

        try {
          await api('/sessions/' + sessionId + '/messages', {
            method: 'POST',
            body: JSON.stringify({ text: text }),
          });

          if (autorun) {
            await api('/sessions/' + sessionId + '/run', { method: 'POST' });
          }
        } catch (e) {
          alert('Failed to send: ' + e.message);
        }
      }

      async function handleRun() {
        if (!sessionId) return;
        try {
          await api('/sessions/' + sessionId + '/run', { method: 'POST' });
        } catch (e) {
          alert('Failed to run: ' + e.message);
        }
      }

      async function handleInterrupt() {
        if (!sessionId) return;
        try {
          await api('/sessions/' + sessionId + '/interrupt', { method: 'POST' });
        } catch (e) {
          alert('Failed to interrupt: ' + e.message);
        }
      }

      async function handlePermissionReply(reqId, reply) {
        try {
          await api('/permissions/' + reqId + '/reply', {
            method: 'POST',
            body: JSON.stringify({ reply: reply }),
          });
        } catch (e) {
          alert('Failed to reply: ' + e.message);
        }
      }

      if (!sessionId) {
        return html`
          <main class="main-content">
            <div class="chat-empty">
              <div class="chat-empty-icon">🎵</div>
              <div class="chat-empty-title">Welcome to Chord Code</div>
              <div class="chat-empty-text">Create or select a session to start chatting</div>
            </div>
          </main>
        `;
      }

      return html`
        <main class="main-content">
          <div class="chat-container">
            <div class="chat-header">
              <div class="chat-header-left">
                <label class="toggle">
                  <input
                    type="checkbox"
                    checked=${autorun}
                    onChange=${(e) => setAutorun(e.target.checked)}
                  />
                  Auto-run
                </label>
              </div>
              <div class="chat-header-right">
                <button class="btn btn-sm" onClick=${handleRun} disabled=${status === 'busy'}>
                  ▶ Run
                </button>
                <button class="btn btn-sm btn-danger" onClick=${handleInterrupt} disabled=${status !== 'busy'}>
                  ⏹ Stop
                </button>
              </div>
            </div>

            <div class="chat-messages" ref=${chatRef}>
              ${sortedMsgs.map(msg => html`
                <${Message}
                  key=${msg.id}
                  message=${msg}
                  parts=${parts}
                  partsByMessage=${partsByMessage}
                  permissions=${permissions}
                  onPermissionReply=${handlePermissionReply}
                />
              `)}

              ${sortedMsgs.length === 0 && html`
                <div class="chat-empty" style="height: auto; padding: 60px 20px;">
                  <div class="chat-empty-text">Send a message to start the conversation</div>
                </div>
              `}
            </div>

            <div class="chat-composer">
              <form class="composer-form" onSubmit=${handleSend}>
                <div class="composer-input-wrapper">
                  <textarea
                    class="composer-textarea"
                    value=${input}
                    onInput=${(e) => setInput(e.target.value)}
                    onKeyDown=${(e) => {
                      if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend(e);
                      }
                    }}
                    placeholder="Type a message... (Enter to send)"
                    rows="1"
                  />
                </div>
                <button type="submit" class="send-btn" disabled=${!input.trim()}>➤</button>
              </form>
            </div>
          </div>
        </main>
      `;
    }

    // ============ Message ============
    function Message({ message, parts, partsByMessage, permissions, onPermissionReply }) {
      const partIds = partsByMessage.get(message.id) || new Set();
      const msgParts = Array.from(partIds).map(id => parts.get(id)).filter(Boolean);
      const isUser = message.role === 'user';
      const messagePermissions = permissions.filter(p => p.tool && p.tool.message_id === message.id);

      return html`
        <div class="message ${message.role}">
          <div class="message-avatar">${isUser ? '👤' : '🤖'}</div>
          <div class="message-content">
            <div class="message-header">
              <span class="message-role">${message.role}</span>
              <span class="message-time">${formatTime(message.created_at)}</span>
              ${message.finish && html`<span class="badge ${message.finish === 'blocked' ? 'badge-warning' : ''}">${message.finish}</span>`}
            </div>
            <div class="message-parts">
              ${msgParts.map(part => html`<${Part} key=${part.id} part=${part} />`)}
              ${messagePermissions.map(perm => html`
                <${PermissionCard} key=${perm.id} permission=${perm} onReply=${onPermissionReply} />
              `)}
            </div>
          </div>
        </div>
      `;
    }

    // ============ Part ============
    function Part({ part }) {
      if (part.type === 'text') {
        return html`
          <div class="message-bubble">
            <div class="message-text" dangerouslySetInnerHTML=${{ __html: renderMd(part.text) }} />
          </div>
        `;
      }
      if (part.type === 'tool') {
        return html`<${ToolCard} part=${part} />`;
      }
      if (part.type === 'reasoning') {
        return html`<${ReasoningPart} part=${part} />`;
      }
      return html`<div class="message-bubble"><pre style="margin:0;font-size:11px">${JSON.stringify(part, null, 2)}</pre></div>`;
    }

    // ============ ToolCard ============
    function ToolCard({ part }) {
      const [expanded, setExpanded] = useState(false);
      const state = part.state || {};
      const status = state.status || 'pending';
      const icons = { pending: '⏳', running: '🔄', completed: '✓', error: '✗' };
      const icon = icons[status] || '🔧';
      const duration = state.time && state.time.end && state.time.start ? formatDuration(state.time.end - state.time.start) : '';
      const shouldCollapse = status === 'completed' && !expanded;

      return html`
        <div class="tool-card ${status}">
          <div class="tool-card-header" onClick=${() => setExpanded(!expanded)}>
            <span class="tool-card-icon">${icon}</span>
            <span class="tool-card-title">${part.tool}</span>
            <div class="tool-card-meta">
              ${duration && html`<span class="tool-card-time">${duration}</span>`}
              ${status === 'running' && html`<span class="spinner"></span>`}
            </div>
            <span class="tool-card-chevron ${expanded ? 'expanded' : ''}">▶</span>
          </div>
          <div class="tool-card-body ${shouldCollapse ? 'collapsed' : ''}">
            ${state.input && html`
              <div class="tool-section">
                <div class="tool-section-label">Input</div>
                <pre class="tool-section-content input">${typeof state.input === 'string' ? state.input : JSON.stringify(state.input, null, 2)}</pre>
              </div>
            `}
            ${status === 'completed' && state.output && html`
              <div class="tool-section">
                <div class="tool-section-label">Output</div>
                <pre class="tool-section-content output">${state.output}</pre>
              </div>
            `}
            ${status === 'error' && state.error && html`
              <div class="tool-section">
                <div class="tool-section-label">Error</div>
                <pre class="tool-section-content error">${state.error}</pre>
              </div>
            `}
          </div>
        </div>
      `;
    }

    // ============ ReasoningPart ============
    function ReasoningPart({ part }) {
      const [expanded, setExpanded] = useState(false);
      return html`
        <div class="reasoning-part">
          <div class="reasoning-header" onClick=${() => setExpanded(!expanded)}>
            <span class="reasoning-icon">🤔</span>
            <span class="reasoning-title">Thinking...</span>
            <span class="reasoning-chevron ${expanded ? 'expanded' : ''}">▶</span>
          </div>
          <div class="reasoning-content ${expanded ? '' : 'collapsed'}">${part.text}</div>
        </div>
      `;
    }

    // ============ PermissionCard ============
    function PermissionCard({ permission, onReply }) {
      return html`
        <div class="permission-card">
          <div class="permission-card-header">
            <span class="permission-card-icon">🔐</span>
            <span class="permission-card-title">Permission Required</span>
          </div>
          <div class="permission-card-body">
            <div class="permission-card-desc"><strong>${permission.permission}</strong> wants to access:</div>
            <pre class="permission-card-content">${(permission.patterns || []).join('\n')}</pre>
            ${permission.metadata && Object.keys(permission.metadata).length > 0 && html`
              <div class="permission-card-meta">${Object.entries(permission.metadata).map(([k, v]) => k + ': ' + v).join(', ')}</div>
            `}
            <div class="permission-card-actions">
              <button class="btn btn-success btn-sm" onClick=${() => onReply(permission.id, 'once')}>Allow Once</button>
              <button class="btn btn-sm" onClick=${() => onReply(permission.id, 'always')}>Always Allow</button>
              <button class="btn btn-danger btn-sm" onClick=${() => onReply(permission.id, 'reject')}>Reject</button>
            </div>
          </div>
        </div>
      `;
    }

    // ============ ObservabilityPanel ============
    function ObservabilityPanel({
      events,
      todos,
      tab,
      onTabChange,
      onClearEvents,
      collapsed,
      logFiles,
      selectedLogDate,
      onSelectedLogDateChange,
      logFilters,
      onLogFilterChange,
      onLogSearch,
      onLogReset,
      onLogPrevPage,
      onLogNextPage,
      onRefreshLogs,
      logItems,
      logTotal,
      logOffset,
      logLimit,
      logHasMore,
      logLoading,
      logError,
      expandedLogLineNo,
      onToggleLogExpand,
    }) {
      if (collapsed) {
        return html`
          <aside class="observability-panel" style="width: 48px; min-width: 48px;">
            <div style="writing-mode: vertical-rl; text-align: center; padding: 12px; color: var(--muted); font-size: 12px;">Observability</div>
          </aside>
        `;
      }

      return html`
        <aside class="observability-panel">
          <div class="observability-header">
            <div class="tabs">
              <button class="tab ${tab === 'events' ? 'active' : ''}" onClick=${() => onTabChange('events')}>Events</button>
              <button class="tab ${tab === 'todos' ? 'active' : ''}" onClick=${() => onTabChange('todos')}>Todos</button>
              <button class="tab ${tab === 'logs' ? 'active' : ''}" onClick=${() => onTabChange('logs')}>Logs</button>
            </div>
            ${tab === 'events' && html`<div class="panel-actions"><button class="icon-btn" onClick=${onClearEvents} title="Clear">🗑</button></div>`}
          </div>
          <div class="observability-content">
            ${tab === 'events' && html`<${EventsTab} events=${events} />`}
            ${tab === 'todos' && html`<${TodosTab} todos=${todos} />`}
            ${tab === 'logs' && html`
              <${LogsTab}
                files=${logFiles}
                selectedDate=${selectedLogDate}
                onSelectedDateChange=${onSelectedLogDateChange}
                filters=${logFilters}
                onFilterChange=${onLogFilterChange}
                onSearch=${onLogSearch}
                onReset=${onLogReset}
                onPrevPage=${onLogPrevPage}
                onNextPage=${onLogNextPage}
                onRefresh=${onRefreshLogs}
                items=${logItems}
                total=${logTotal}
                offset=${logOffset}
                limit=${logLimit}
                hasMore=${logHasMore}
                loading=${logLoading}
                error=${logError}
                expandedLineNo=${expandedLogLineNo}
                onToggleExpand=${onToggleLogExpand}
              />
            `}
          </div>
        </aside>
      `;
    }

    // ============ EventsTab ============
    function EventsTab({ events }) {
      if (events.length === 0) {
        return html`<div class="observability-empty"><div class="observability-empty-icon">📡</div><div class="observability-empty-text">No events yet</div></div>`;
      }
      function getEventClass(type) {
        if (type.startsWith('session.')) return 'session';
        if (type.startsWith('message.')) return 'message';
        if (type.startsWith('permission.')) return 'permission';
        if (type.startsWith('todo.')) return 'todo';
        if (type.includes('error')) return 'error';
        return '';
      }
      return html`
        <div class="panel-section">
          <div class="events-list">
            ${events.map((evt, i) => html`
              <div key=${i} class="event-item ${getEventClass(evt.type)}">
                <div class="event-header">
                  <span class="event-type">${evt.type}</span>
                  <span class="event-time">${formatTime(evt.time)}</span>
                </div>
              </div>
            `)}
          </div>
        </div>
      `;
    }

    // ============ TodosTab ============
    function TodosTab({ todos }) {
      if (todos.length === 0) {
        return html`<div class="observability-empty"><div class="observability-empty-icon">📋</div><div class="observability-empty-text">No todos</div></div>`;
      }
      const completed = todos.filter(t => t.status === 'completed').length;
      const percent = Math.round((completed / todos.length) * 100);
      const statusIcon = { pending: '[ ]', in_progress: '[>]', completed: '[x]', cancelled: '[-]' };

      return html`
        <div class="todos-container">
          <div class="todos-header">
            <span class="todos-stats">${completed}/${todos.length}</span>
            <div class="todos-progress"><div class="todos-progress-fill" style="width: ${percent}%"></div></div>
          </div>
          <div class="todos-list">
            ${todos.map(todo => html`
              <div key=${todo.id} class="todo-item ${todo.status === 'in_progress' ? 'in-progress' : ''} ${todo.status} ${todo.priority === 'high' ? 'priority-high' : ''}">
                <span class="todo-icon">${statusIcon[todo.status] || '[ ]'}</span>
                <div class="todo-content">
                  <div class="todo-text">${todo.content}</div>
                  ${todo.status === 'in_progress' && todo.activeForm && html`<div class="todo-active-form">${todo.activeForm}</div>`}
                </div>
              </div>
            `)}
          </div>
        </div>
      `;
    }

    // ============ LogsTab ============
    function LogsTab({
      files,
      selectedDate,
      onSelectedDateChange,
      filters,
      onFilterChange,
      onSearch,
      onReset,
      onPrevPage,
      onNextPage,
      onRefresh,
      items,
      total,
      offset,
      limit,
      hasMore,
      loading,
      error,
      expandedLineNo,
      onToggleExpand,
    }) {
      const levelClass = (level) => String(level || '').toLowerCase();
      const from = total > 0 ? offset + 1 : 0;
      const to = total > 0 ? offset + items.length : 0;

      return html`
        <div class="logs-container">
          <div class="logs-filters">
            <div class="logs-filter-row">
              <label class="logs-filter-label">Date</label>
              <select
                class="input logs-filter-input logs-select"
                value=${selectedDate}
                onChange=${(e) => onSelectedDateChange(e.target.value)}
              >
                <option value="">Select date</option>
                ${files.map(file => html`
                  <option key=${file.date} value=${file.date}>${file.date}</option>
                `)}
              </select>
            </div>
            <div class="logs-filter-row">
              <label class="logs-filter-label">Level</label>
              <select
                class="input logs-filter-input logs-select"
                value=${filters.level}
                onChange=${(e) => onFilterChange('level', e.target.value)}
              >
                <option value="">All</option>
                <option value="DEBUG">DEBUG</option>
                <option value="INFO">INFO</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
              </select>
            </div>
            <div class="logs-filter-row">
              <label class="logs-filter-label">Event</label>
              <input
                class="input logs-filter-input"
                type="text"
                value=${filters.event}
                onInput=${(e) => onFilterChange('event', e.target.value)}
                placeholder="contains..."
              />
            </div>
            <div class="logs-filter-row">
              <label class="logs-filter-label">Session</label>
              <input
                class="input logs-filter-input"
                type="text"
                value=${filters.session_id}
                onInput=${(e) => onFilterChange('session_id', e.target.value)}
                placeholder="exact session_id"
              />
            </div>
            <div class="logs-filter-row">
              <label class="logs-filter-label">Keyword</label>
              <input
                class="input logs-filter-input"
                type="text"
                value=${filters.q}
                onInput=${(e) => onFilterChange('q', e.target.value)}
                placeholder="search all fields"
              />
            </div>
            <div class="logs-filter-actions">
              <button class="btn btn-sm" onClick=${onSearch} disabled=${loading || !selectedDate}>Search</button>
              <button class="btn btn-sm" onClick=${onReset} disabled=${loading}>Reset</button>
              <button class="icon-btn" onClick=${onRefresh} title="Refresh file list" disabled=${loading}>↻</button>
            </div>
          </div>

          ${error && html`<div class="logs-error">${error}</div>`}

          ${loading && html`
            <div class="observability-empty">
              <div class="spinner"></div>
              <div class="observability-empty-text">Loading logs...</div>
            </div>
          `}

          ${!loading && !error && items.length === 0 && html`
            <div class="observability-empty">
              <div class="observability-empty-icon">🗒</div>
              <div class="observability-empty-text">No logs matched</div>
            </div>
          `}

          ${!loading && !error && items.length > 0 && html`
            <div class="logs-list">
              ${items.map(item => html`
                <div key=${item.line_no} class="log-row">
                  <button class="log-row-main" onClick=${() => onToggleExpand(item.line_no)}>
                    <span class="log-time">${formatDateTime(item.ts)}</span>
                    <span class="log-level ${levelClass(item.level)}">${item.level || '-'}</span>
                    <span class="log-event">${item.event || '-'}</span>
                    <span class="log-message-line">${item.message || ''}</span>
                  </button>
                  <div class="log-meta">
                    <span>line ${item.line_no}</span>
                    ${item.session_id && html`<span>sid: ${item.session_id}</span>`}
                    ${item.module && html`<span>${item.module}${item.function ? ':' + item.function : ''}</span>`}
                  </div>
                  ${expandedLineNo === item.line_no && html`
                    <pre class="log-raw">${JSON.stringify(item.raw, null, 2)}</pre>
                  `}
                </div>
              `)}
            </div>
          `}

          <div class="logs-pagination">
            <span class="logs-pagination-stat">${from}-${to} / ${total}</span>
            <div class="logs-pagination-actions">
              <button class="btn btn-sm" onClick=${onPrevPage} disabled=${loading || offset <= 0}>Prev</button>
              <button class="btn btn-sm" onClick=${onNextPage} disabled=${loading || !hasMore}>Next</button>
            </div>
          </div>
        </div>
      `;
    }

    // ============ Mount ============
    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
