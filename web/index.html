<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chord Code</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">

  <!-- Styles -->
  <link rel="stylesheet" href="/static/styles/base.css">
  <link rel="stylesheet" href="/static/styles/layout.css">
  <link rel="stylesheet" href="/static/styles/components.css">
  <link rel="stylesheet" href="/static/styles/sidebar.css">
  <link rel="stylesheet" href="/static/styles/chat.css">
  <link rel="stylesheet" href="/static/styles/parts.css">
  <link rel="stylesheet" href="/static/styles/observability.css">

  <!-- Preact & HTM (UMD builds) -->
  <script src="https://unpkg.com/preact@10.19.3/dist/preact.umd.js"></script>
  <script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

  <!-- Marked for Markdown -->
  <script src="https://unpkg.com/marked@11.1.1/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; color: #9fb0c0;">
      Loading...
    </div>
  </div>

  <script>
    // Setup HTM with Preact
    const html = htm.bind(preact.h);
    const { render } = preact;
    const { useState, useEffect, useRef, useMemo, useCallback } = preactHooks;

    // ============ API ============
    async function api(url, options = {}) {
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...options.headers },
        ...options,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || 'Request failed');
      }
      return res.json();
    }

    // ============ Utilities ============
    function formatTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function formatDateTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return String(ts);
      return d.toLocaleString();
    }

    function formatRelative(ts) {
      if (!ts) return '';
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(mins / 60);
      const days = Math.floor(hours / 24);
      if (days > 0) return days + 'd ago';
      if (hours > 0) return hours + 'h ago';
      if (mins > 0) return mins + 'm ago';
      return 'just now';
    }

    function formatDuration(ms) {
      if (!ms) return '';
      if (ms < 1000) return ms + 'ms';
      return (ms / 1000).toFixed(1) + 's';
    }

    function renderMd(text) {
      if (!text) return '';
      try {
        return marked.parse(text);
      } catch (e) {
        return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
    }

    // ============ SSE Manager ============
    let sseSource = null;
    let sseCallback = null;

    function connectSSE(sessionId, onEvent) {
      if (sseSource) sseSource.close();
      sseCallback = onEvent;

      const url = '/events?session_id=' + encodeURIComponent(sessionId);
      sseSource = new EventSource(url);

      sseSource.onopen = () => {
        console.log('[SSE] Connected');
      };

      sseSource.onmessage = (evt) => {
        try {
          const event = JSON.parse(evt.data);
          if (sseCallback) sseCallback(event);
        } catch (e) {
          console.error('[SSE] Parse error:', e);
        }
      };

      sseSource.onerror = () => {
        console.warn('[SSE] Connection error');
      };
    }

    // ============ Main App ============
    function App() {
      const [sessions, setSessions] = useState([]);
      const [activeSessionId, setActiveSessionId] = useState(null);
      const [messages, setMessages] = useState(new Map());
      const [parts, setParts] = useState(new Map());
      const [partsByMessage, setPartsByMessage] = useState(new Map());
      const [todos, setTodos] = useState([]);
      const [events, setEvents] = useState([]);
      const [pendingPermissions, setPendingPermissions] = useState([]);
      const [sessionStatus, setSessionStatus] = useState('idle');
      const [showNewSessionForm, setShowNewSessionForm] = useState(false);
      const [observabilityTab, setObservabilityTab] = useState('events');
      const [observabilityCollapsed, setObservabilityCollapsed] = useState(false);
      const [defaultWorktree, setDefaultWorktree] = useState('');
      const [logFiles, setLogFiles] = useState([]);
      const [selectedLogDate, setSelectedLogDate] = useState('');
      const [logFilters, setLogFilters] = useState({ level: '', event: '', session_id: '', q: '' });
      const [logItems, setLogItems] = useState([]);
      const [logTotal, setLogTotal] = useState(0);
      const [logOffset, setLogOffset] = useState(0);
      const [logLimit, setLogLimit] = useState(100);
      const [logHasMore, setLogHasMore] = useState(false);
      const [logLoading, setLogLoading] = useState(false);
      const [logError, setLogError] = useState('');
      const [expandedLogLineNo, setExpandedLogLineNo] = useState(null);
      const [logFiltersInitialized, setLogFiltersInitialized] = useState(false);

      // Handle SSE events
      const handleSSEEvent = useCallback((event) => {
        const { type, properties } = event;

        // Add to events log
        setEvents(prev => [{ type, properties, time: Date.now() }, ...prev].slice(0, 100));

        switch (type) {
          case 'session.status':
            setSessionStatus(properties.status);
            break;

          case 'message.updated':
            const msg = properties.info;
            setMessages(prev => {
              const next = new Map(prev);
              next.set(msg.id, msg);
              return next;
            });
            break;

          case 'message.part.updated':
            const part = properties.part;
            setParts(prev => {
              const next = new Map(prev);
              next.set(part.id, part);
              return next;
            });
            setPartsByMessage(prev => {
              const next = new Map(prev);
              const pset = next.get(part.message_id) || new Set();
              pset.add(part.id);
              next.set(part.message_id, pset);
              return next;
            });
            break;

          case 'permission.asked':
            setPendingPermissions(prev => [...prev, properties]);
            break;

          case 'permission.replied':
            setPendingPermissions(prev => prev.filter(p => p.id !== properties.request_id));
            break;

          case 'todo.updated':
            setTodos(properties.todos || []);
            break;
        }
      }, []);

      // Load initial data
      useEffect(() => {
        api('/config').then(cfg => {
          setDefaultWorktree(cfg.default_worktree || '');
        }).catch(e => console.error('Config error:', e));

        api('/sessions').then(data => {
          setSessions(data.sessions || []);
          if (data.sessions && data.sessions.length > 0) {
            selectSession(data.sessions[0].id);
          }
        }).catch(e => console.error('Sessions error:', e));
      }, []);

      useEffect(() => {
        if (!logFiltersInitialized && activeSessionId) {
          setLogFilters(prev => ({ ...prev, session_id: prev.session_id || activeSessionId }));
          setLogFiltersInitialized(true);
        }
      }, [activeSessionId, logFiltersInitialized]);

      useEffect(() => {
        if (observabilityTab === 'logs') {
          refreshLogs();
        }
      }, [observabilityTab]);

      // Select session
      async function selectSession(id) {
        setActiveSessionId(id);
        setMessages(new Map());
        setParts(new Map());
        setPartsByMessage(new Map());
        setTodos([]);
        setPendingPermissions([]);
        setSessionStatus('idle');

        // Connect SSE
        connectSSE(id, handleSSEEvent);

        // Load messages
        try {
          const msgList = await api('/sessions/' + id + '/messages');
          const msgMap = new Map();
          const partMap = new Map();
          const pbmMap = new Map();

          msgList.forEach(mwp => {
            msgMap.set(mwp.info.id, mwp.info);
            const pids = new Set();
            mwp.parts.forEach(p => {
              partMap.set(p.id, p);
              pids.add(p.id);
            });
            pbmMap.set(mwp.info.id, pids);
          });

          setMessages(msgMap);
          setParts(partMap);
          setPartsByMessage(pbmMap);
        } catch (e) {
          console.error('Messages error:', e);
        }

        // Load todos
        try {
          const data = await api('/sessions/' + id + '/todos');
          setTodos(data.todos || []);
        } catch (e) {
          console.error('Todos error:', e);
        }
      }

      // Create session
      async function createSession(worktree, title) {
        try {
          const session = await api('/sessions', {
            method: 'POST',
            body: JSON.stringify({ worktree: worktree, title: title || 'New Session' }),
          });
          setSessions(prev => [session, ...prev]);
          setShowNewSessionForm(false);
          selectSession(session.id);
        } catch (e) {
          alert('Failed to create session: ' + e.message);
        }
      }

      async function requestLogs(date, offset, filters, limit = logLimit) {
        const params = new URLSearchParams();
        params.set('date', date);
        params.set('offset', String(Math.max(0, offset)));
        params.set('limit', String(limit));

        const normalized = {
          level: (filters.level || '').trim(),
          event: (filters.event || '').trim(),
          session_id: (filters.session_id || '').trim(),
          q: (filters.q || '').trim(),
        };
        if (normalized.level) params.set('level', normalized.level);
        if (normalized.event) params.set('event', normalized.event);
        if (normalized.session_id) params.set('session_id', normalized.session_id);
        if (normalized.q) params.set('q', normalized.q);

        const data = await api('/logs?' + params.toString());
        setLogItems(data.items || []);
        setLogTotal(data.total || 0);
        setLogOffset(data.offset || 0);
        setLogLimit(data.limit || limit);
        setLogHasMore(Boolean(data.has_more));
        setExpandedLogLineNo(null);
      }

      async function refreshLogs() {
        setLogLoading(true);
        setLogError('');
        try {
          const data = await api('/logs/files');
          const files = data.files || [];
          setLogFiles(files);

          let nextDate = selectedLogDate;
          if (!nextDate || !files.some(f => f.date === nextDate)) {
            nextDate = data.default_date || '';
          }
          setSelectedLogDate(nextDate);

          let nextFilters = logFilters;
          if (!logFiltersInitialized && activeSessionId) {
            nextFilters = { ...logFilters, session_id: activeSessionId };
            setLogFilters(nextFilters);
            setLogFiltersInitialized(true);
          }

          if (nextDate) {
            await requestLogs(nextDate, 0, nextFilters, logLimit);
          } else {
            setLogItems([]);
            setLogTotal(0);
            setLogOffset(0);
            setLogHasMore(false);
          }
        } catch (e) {
          setLogError('Failed to load logs: ' + e.message);
          setLogItems([]);
          setLogTotal(0);
          setLogOffset(0);
          setLogHasMore(false);
        } finally {
          setLogLoading(false);
        }
      }

      async function runLogSearch(offset = 0, filters = logFilters) {
        if (!selectedLogDate) {
          setLogError('Please select a log date first.');
          setLogItems([]);
          setLogTotal(0);
          setLogOffset(0);
          setLogHasMore(false);
          return;
        }
        setLogLoading(true);
        setLogError('');
        try {
          await requestLogs(selectedLogDate, offset, filters, logLimit);
        } catch (e) {
          setLogError('Failed to load logs: ' + e.message);
          setLogItems([]);
          setLogTotal(0);
          setLogOffset(0);
          setLogHasMore(false);
        } finally {
          setLogLoading(false);
        }
      }

      function handleLogFilterChange(field, value) {
        setLogFilters(prev => ({ ...prev, [field]: value }));
      }

      function handleResetLogFilters() {
        const nextFilters = {
          level: '',
          event: '',
          session_id: activeSessionId || '',
          q: '',
        };
        setLogFilters(nextFilters);
        setLogFiltersInitialized(true);
        runLogSearch(0, nextFilters);
      }

      const activeSession = sessions.find(s => s.id === activeSessionId);

      return html`
        <div class="app-layout ${observabilityCollapsed ? 'observability-collapsed' : ''}">
          <${Header}
            session=${activeSession}
            status=${sessionStatus}
            onToggleObservability=${() => setObservabilityCollapsed(!observabilityCollapsed)}
            observabilityCollapsed=${observabilityCollapsed}
          />
          <${Sidebar}
            sessions=${sessions}
            activeId=${activeSessionId}
            onSelect=${selectSession}
            onCreate=${createSession}
            showForm=${showNewSessionForm}
            onToggleForm=${() => setShowNewSessionForm(!showNewSessionForm)}
            defaultWorktree=${defaultWorktree}
          />
          <${MainContent}
            sessionId=${activeSessionId}
            messages=${messages}
            parts=${parts}
            partsByMessage=${partsByMessage}
            status=${sessionStatus}
            permissions=${pendingPermissions}
          />
          <${ObservabilityPanel}
            events=${events}
            todos=${todos}
            tab=${observabilityTab}
            onTabChange=${setObservabilityTab}
            onClearEvents=${() => setEvents([])}
            collapsed=${observabilityCollapsed}
            logFiles=${logFiles}
            selectedLogDate=${selectedLogDate}
            onSelectedLogDateChange=${setSelectedLogDate}
            logFilters=${logFilters}
            onLogFilterChange=${handleLogFilterChange}
            onLogSearch=${() => runLogSearch(0, logFilters)}
            onLogReset=${handleResetLogFilters}
            onLogPrevPage=${() => runLogSearch(Math.max(0, logOffset - logLimit), logFilters)}
            onLogNextPage=${() => runLogSearch(logOffset + logLimit, logFilters)}
            onRefreshLogs=${refreshLogs}
            logItems=${logItems}
            logTotal=${logTotal}
            logOffset=${logOffset}
            logLimit=${logLimit}
            logHasMore=${logHasMore}
            logLoading=${logLoading}
            logError=${logError}
            expandedLogLineNo=${expandedLogLineNo}
            onToggleLogExpand=${(lineNo) => setExpandedLogLineNo(prev => (prev === lineNo ? null : lineNo))}
          />
        </div>
      `;
    }

    // ============ Header ============
    function Header({ session, status, onToggleObservability, observabilityCollapsed }) {
      return html`
        <header class="app-header">
          <div class="header-left">
            <div class="logo">
              <div class="logo-icon">CC</div>
              <span class="logo-text">Chord Code</span>
            </div>
          </div>
          <div class="header-center">
            ${session && html`
              <div class="session-info">
                <span class="title">${session.title}</span>
                <span class="badge">${session.worktree.split('/').pop()}</span>
              </div>
            `}
          </div>
          <div class="header-right">
            <div class="status-indicator ${status}">
              <span class="dot"></span>
              ${status}
            </div>
            <button class="icon-btn" onClick=${onToggleObservability}>
              ${observabilityCollapsed ? '◀' : '▶'}
            </button>
          </div>
        </header>
      `;
    }

    // ============ Sidebar ============
    function Sidebar({ sessions, activeId, onSelect, onCreate, showForm, onToggleForm, defaultWorktree }) {
      const [worktree, setWorktree] = useState(defaultWorktree || '');
      const [title, setTitle] = useState('');

      useEffect(() => {
        if (defaultWorktree && !worktree) {
          setWorktree(defaultWorktree);
        }
      }, [defaultWorktree]);

      function handleCreate(e) {
        e.preventDefault();
        if (worktree.trim()) {
          onCreate(worktree.trim(), title.trim());
          setWorktree(defaultWorktree || '');
          setTitle('');
        }
      }

      return html`
        <aside class="sidebar">
          <div class="sidebar-header">
            <button class="new-session-btn" onClick=${onToggleForm}>
              ${showForm ? '✕ Cancel' : '+ New Session'}
            </button>
          </div>

          ${showForm && html`
            <form class="new-session-form" onSubmit=${handleCreate}>
              <div class="form-group">
                <label>Worktree Path</label>
                <input
                  class="input"
                  type="text"
                  value=${worktree}
                  onInput=${(e) => setWorktree(e.target.value)}
                  placeholder="/path/to/project"
                  required
                />
              </div>
              <div class="form-group">
                <label>Title (optional)</label>
                <input
                  class="input"
                  type="text"
                  value=${title}
                  onInput=${(e) => setTitle(e.target.value)}
                  placeholder="My Session"
                />
              </div>
              <div class="form-actions">
                <button type="submit" class="btn" disabled=${!worktree.trim()}>Create</button>
              </div>
            </form>
          `}

          <div class="sidebar-content">
            <div class="sidebar-title">Sessions</div>
            <div class="session-list">
              ${sessions.length === 0 && html`
                <div class="session-empty">
                  <div class="session-empty-icon">💬</div>
                  <div class="session-empty-text">No sessions yet</div>
                </div>
              `}
              ${sessions.map(s => html`
                <div
                  key=${s.id}
                  class="session-item ${s.id === activeId ? 'active' : ''}"
                  onClick=${() => onSelect(s.id)}
                >
                  <div class="session-item-indicator"></div>
                  <div class="session-item-content">
                    <div class="session-item-title">${s.title}</div>
                    <div class="session-item-meta">${formatRelative(s.updated_at)}</div>
                  </div>
                </div>
              `)}
            </div>
          </div>
        </aside>
      `;
    }

    // ============ MainContent ============
    function MainContent({ sessionId, messages, parts, partsByMessage, status, permissions }) {
      const [input, setInput] = useState('');
      const [autorun, setAutorun] = useState(true);
      const chatRef = useRef(null);

      const sortedMsgs = useMemo(() => {
        return Array.from(messages.values())
          .filter(m => m.session_id === sessionId && m.role !== 'tool')
          .sort((a, b) => a.created_at - b.created_at);
      }, [messages, sessionId]);

      useEffect(() => {
        if (chatRef.current) {
          chatRef.current.scrollTop = chatRef.current.scrollHeight;
        }
      }, [parts, sortedMsgs.length]);

      async function handleSend(e) {
        e.preventDefault();
        if (!input.trim() || !sessionId) return;

        const text = input.trim();
        setInput('');

        try {
          await api('/sessions/' + sessionId + '/messages', {
            method: 'POST',
            body: JSON.stringify({ text: text }),
          });

          if (autorun) {
            await api('/sessions/' + sessionId + '/run', { method: 'POST' });
          }
        } catch (e) {
          alert('Failed to send: ' + e.message);
        }
      }

      async function handleRun() {
        if (!sessionId) return;
        try {
          await api('/sessions/' + sessionId + '/run', { method: 'POST' });
        } catch (e) {
          alert('Failed to run: ' + e.message);
        }
      }

      async function handleInterrupt() {
        if (!sessionId) return;
        try {
          await api('/sessions/' + sessionId + '/interrupt', { method: 'POST' });
        } catch (e) {
          alert('Failed to interrupt: ' + e.message);
        }
      }

      async function handlePermissionReply(reqId, reply) {
        try {
          await api('/permissions/' + reqId + '/reply', {
            method: 'POST',
            body: JSON.stringify({ reply: reply }),
          });
        } catch (e) {
          alert('Failed to reply: ' + e.message);
        }
      }

      if (!sessionId) {
        return html`
          <main class="main-content">
            <div class="chat-empty">
              <div class="chat-empty-icon">🎵</div>
              <div class="chat-empty-title">Welcome to Chord Code</div>
              <div class="chat-empty-text">Create or select a session to start chatting</div>
            </div>
          </main>
        `;
      }

      return html`
        <main class="main-content">
          <div class="chat-container">
            <div class="chat-header">
              <div class="chat-header-left">
                <label class="toggle">
                  <input
                    type="checkbox"
                    checked=${autorun}
                    onChange=${(e) => setAutorun(e.target.checked)}
                  />
                  Auto-run
                </label>
              </div>
              <div class="chat-header-right">
                <button class="btn btn-sm" onClick=${handleRun} disabled=${status === 'busy'}>
                  ▶ Run
                </button>
                <button class="btn btn-sm btn-danger" onClick=${handleInterrupt} disabled=${status !== 'busy'}>
                  ⏹ Stop
                </button>
              </div>
            </div>

            <div class="chat-messages" ref=${chatRef}>
              ${sortedMsgs.map(msg => html`
                <${Message}
                  key=${msg.id}
                  message=${msg}
                  parts=${parts}
                  partsByMessage=${partsByMessage}
                  permissions=${permissions}
                  onPermissionReply=${handlePermissionReply}
                />
              `)}

              ${sortedMsgs.length === 0 && html`
                <div class="chat-empty" style="height: auto; padding: 60px 20px;">
                  <div class="chat-empty-text">Send a message to start the conversation</div>
                </div>
              `}
            </div>

            <div class="chat-composer">
              <form class="composer-form" onSubmit=${handleSend}>
                <div class="composer-input-wrapper">
                  <textarea
                    class="composer-textarea"
                    value=${input}
                    onInput=${(e) => setInput(e.target.value)}
                    onKeyDown=${(e) => {
                      if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        handleSend(e);
                      }
                    }}
                    placeholder="Type a message... (Enter to send)"
                    rows="1"
                  />
                </div>
                <button type="submit" class="send-btn" disabled=${!input.trim()}>➤</button>
              </form>
            </div>
          </div>
        </main>
      `;
    }

    // ============ Message ============
    function Message({ message, parts, partsByMessage, permissions, onPermissionReply }) {
      const partIds = partsByMessage.get(message.id) || new Set();
      const msgParts = Array.from(partIds).map(id => parts.get(id)).filter(Boolean);
      const isUser = message.role === 'user';
      const messagePermissions = permissions.filter(p => p.tool && p.tool.message_id === message.id);

      return html`
        <div class="message ${message.role}">
          <div class="message-avatar">${isUser ? '👤' : '🤖'}</div>
          <div class="message-content">
            <div class="message-header">
              <span class="message-role">${message.role}</span>
              <span class="message-time">${formatTime(message.created_at)}</span>
              ${message.finish && html`<span class="badge ${message.finish === 'blocked' ? 'badge-warning' : ''}">${message.finish}</span>`}
            </div>
            <div class="message-parts">
              ${msgParts.map(part => html`<${Part} key=${part.id} part=${part} />`)}
              ${messagePermissions.map(perm => html`
                <${PermissionCard} key=${perm.id} permission=${perm} onReply=${onPermissionReply} />
              `)}
            </div>
          </div>
        </div>
      `;
    }

    // ============ Part ============
    function Part({ part }) {
      if (part.type === 'text') {
        return html`
          <div class="message-bubble">
            <div class="message-text" dangerouslySetInnerHTML=${{ __html: renderMd(part.text) }} />
          </div>
        `;
      }
      if (part.type === 'tool') {
        return html`<${ToolCard} part=${part} />`;
      }
      if (part.type === 'reasoning') {
        return html`<${ReasoningPart} part=${part} />`;
      }
      return html`<div class="message-bubble"><pre style="margin:0;font-size:11px">${JSON.stringify(part, null, 2)}</pre></div>`;
    }

    // ============ ToolCard ============
    function ToolCard({ part }) {
      const [expanded, setExpanded] = useState(false);
      const state = part.state || {};
      const status = state.status || 'pending';
      const icons = { pending: '⏳', running: '🔄', completed: '✓', error: '✗' };
      const icon = icons[status] || '🔧';
      const duration = state.time && state.time.end && state.time.start ? formatDuration(state.time.end - state.time.start) : '';
      const shouldCollapse = status === 'completed' && !expanded;

      return html`
        <div class="tool-card ${status}">
          <div class="tool-card-header" onClick=${() => setExpanded(!expanded)}>
            <span class="tool-card-icon">${icon}</span>
            <span class="tool-card-title">${part.tool}</span>
            <div class="tool-card-meta">
              ${duration && html`<span class="tool-card-time">${duration}</span>`}
              ${status === 'running' && html`<span class="spinner"></span>`}
            </div>
            <span class="tool-card-chevron ${expanded ? 'expanded' : ''}">▶</span>
          </div>
          <div class="tool-card-body ${shouldCollapse ? 'collapsed' : ''}">
            ${state.input && html`
              <div class="tool-section">
                <div class="tool-section-label">Input</div>
                <pre class="tool-section-content input">${typeof state.input === 'string' ? state.input : JSON.stringify(state.input, null, 2)}</pre>
              </div>
            `}
            ${status === 'completed' && state.output && html`
              <div class="tool-section">
                <div class="tool-section-label">Output</div>
                <pre class="tool-section-content output">${state.output}</pre>
              </div>
            `}
            ${status === 'error' && state.error && html`
              <div class="tool-section">
                <div class="tool-section-label">Error</div>
                <pre class="tool-section-content error">${state.error}</pre>
              </div>
            `}
          </div>
        </div>
      `;
    }

    // ============ ReasoningPart ============
    function ReasoningPart({ part }) {
      const [expanded, setExpanded] = useState(false);
      return html`
        <div class="reasoning-part">
          <div class="reasoning-header" onClick=${() => setExpanded(!expanded)}>
            <span class="reasoning-icon">🤔</span>
            <span class="reasoning-title">Thinking...</span>
            <span class="reasoning-chevron ${expanded ? 'expanded' : ''}">▶</span>
          </div>
          <div class="reasoning-content ${expanded ? '' : 'collapsed'}">${part.text}</div>
        </div>
      `;
    }

    // ============ PermissionCard ============
    function PermissionCard({ permission, onReply }) {
      return html`
        <div class="permission-card">
          <div class="permission-card-header">
            <span class="permission-card-icon">🔐</span>
            <span class="permission-card-title">Permission Required</span>
          </div>
          <div class="permission-card-body">
            <div class="permission-card-desc"><strong>${permission.permission}</strong> wants to access:</div>
            <pre class="permission-card-content">${(permission.patterns || []).join('\n')}</pre>
            ${permission.metadata && Object.keys(permission.metadata).length > 0 && html`
              <div class="permission-card-meta">${Object.entries(permission.metadata).map(([k, v]) => k + ': ' + v).join(', ')}</div>
            `}
            <div class="permission-card-actions">
              <button class="btn btn-success btn-sm" onClick=${() => onReply(permission.id, 'once')}>Allow Once</button>
              <button class="btn btn-sm" onClick=${() => onReply(permission.id, 'always')}>Always Allow</button>
              <button class="btn btn-danger btn-sm" onClick=${() => onReply(permission.id, 'reject')}>Reject</button>
            </div>
          </div>
        </div>
      `;
    }

    // ============ ObservabilityPanel ============
    function ObservabilityPanel({
      events,
      todos,
      tab,
      onTabChange,
      onClearEvents,
      collapsed,
      logFiles,
      selectedLogDate,
      onSelectedLogDateChange,
      logFilters,
      onLogFilterChange,
      onLogSearch,
      onLogReset,
      onLogPrevPage,
      onLogNextPage,
      onRefreshLogs,
      logItems,
      logTotal,
      logOffset,
      logLimit,
      logHasMore,
      logLoading,
      logError,
      expandedLogLineNo,
      onToggleLogExpand,
    }) {
      if (collapsed) {
        return html`
          <aside class="observability-panel" style="width: 48px; min-width: 48px;">
            <div style="writing-mode: vertical-rl; text-align: center; padding: 12px; color: var(--muted); font-size: 12px;">Observability</div>
          </aside>
        `;
      }

      return html`
        <aside class="observability-panel">
          <div class="observability-header">
            <div class="tabs">
              <button class="tab ${tab === 'events' ? 'active' : ''}" onClick=${() => onTabChange('events')}>Events</button>
              <button class="tab ${tab === 'todos' ? 'active' : ''}" onClick=${() => onTabChange('todos')}>Todos</button>
              <button class="tab ${tab === 'logs' ? 'active' : ''}" onClick=${() => onTabChange('logs')}>Logs</button>
            </div>
            ${tab === 'events' && html`<div class="panel-actions"><button class="icon-btn" onClick=${onClearEvents} title="Clear">🗑</button></div>`}
          </div>
          <div class="observability-content">
            ${tab === 'events' && html`<${EventsTab} events=${events} />`}
            ${tab === 'todos' && html`<${TodosTab} todos=${todos} />`}
            ${tab === 'logs' && html`
              <${LogsTab}
                files=${logFiles}
                selectedDate=${selectedLogDate}
                onSelectedDateChange=${onSelectedLogDateChange}
                filters=${logFilters}
                onFilterChange=${onLogFilterChange}
                onSearch=${onLogSearch}
                onReset=${onLogReset}
                onPrevPage=${onLogPrevPage}
                onNextPage=${onLogNextPage}
                onRefresh=${onRefreshLogs}
                items=${logItems}
                total=${logTotal}
                offset=${logOffset}
                limit=${logLimit}
                hasMore=${logHasMore}
                loading=${logLoading}
                error=${logError}
                expandedLineNo=${expandedLogLineNo}
                onToggleExpand=${onToggleLogExpand}
              />
            `}
          </div>
        </aside>
      `;
    }

    // ============ EventsTab ============
    function EventsTab({ events }) {
      if (events.length === 0) {
        return html`<div class="observability-empty"><div class="observability-empty-icon">📡</div><div class="observability-empty-text">No events yet</div></div>`;
      }
      function getEventClass(type) {
        if (type.startsWith('session.')) return 'session';
        if (type.startsWith('message.')) return 'message';
        if (type.startsWith('permission.')) return 'permission';
        if (type.startsWith('todo.')) return 'todo';
        if (type.includes('error')) return 'error';
        return '';
      }
      return html`
        <div class="panel-section">
          <div class="events-list">
            ${events.map((evt, i) => html`
              <div key=${i} class="event-item ${getEventClass(evt.type)}">
                <div class="event-header">
                  <span class="event-type">${evt.type}</span>
                  <span class="event-time">${formatTime(evt.time)}</span>
                </div>
              </div>
            `)}
          </div>
        </div>
      `;
    }

    // ============ TodosTab ============
    function TodosTab({ todos }) {
      if (todos.length === 0) {
        return html`<div class="observability-empty"><div class="observability-empty-icon">📋</div><div class="observability-empty-text">No todos</div></div>`;
      }
      const completed = todos.filter(t => t.status === 'completed').length;
      const percent = Math.round((completed / todos.length) * 100);
      const statusIcon = { pending: '[ ]', in_progress: '[>]', completed: '[x]', cancelled: '[-]' };

      return html`
        <div class="todos-container">
          <div class="todos-header">
            <span class="todos-stats">${completed}/${todos.length}</span>
            <div class="todos-progress"><div class="todos-progress-fill" style="width: ${percent}%"></div></div>
          </div>
          <div class="todos-list">
            ${todos.map(todo => html`
              <div key=${todo.id} class="todo-item ${todo.status === 'in_progress' ? 'in-progress' : ''} ${todo.status} ${todo.priority === 'high' ? 'priority-high' : ''}">
                <span class="todo-icon">${statusIcon[todo.status] || '[ ]'}</span>
                <div class="todo-content">
                  <div class="todo-text">${todo.content}</div>
                  ${todo.status === 'in_progress' && todo.activeForm && html`<div class="todo-active-form">${todo.activeForm}</div>`}
                </div>
              </div>
            `)}
          </div>
        </div>
      `;
    }

    // ============ LogsTab ============
    function LogsTab({
      files,
      selectedDate,
      onSelectedDateChange,
      filters,
      onFilterChange,
      onSearch,
      onReset,
      onPrevPage,
      onNextPage,
      onRefresh,
      items,
      total,
      offset,
      limit,
      hasMore,
      loading,
      error,
      expandedLineNo,
      onToggleExpand,
    }) {
      const levelClass = (level) => String(level || '').toLowerCase();
      const from = total > 0 ? offset + 1 : 0;
      const to = total > 0 ? offset + items.length : 0;

      return html`
        <div class="logs-container">
          <div class="logs-filters">
            <div class="logs-filter-row">
              <label class="logs-filter-label">Date</label>
              <select
                class="input logs-filter-input"
                value=${selectedDate}
                onChange=${(e) => onSelectedDateChange(e.target.value)}
              >
                <option value="">Select date</option>
                ${files.map(file => html`
                  <option key=${file.date} value=${file.date}>${file.date}</option>
                `)}
              </select>
            </div>
            <div class="logs-filter-row">
              <label class="logs-filter-label">Level</label>
              <select
                class="input logs-filter-input"
                value=${filters.level}
                onChange=${(e) => onFilterChange('level', e.target.value)}
              >
                <option value="">All</option>
                <option value="DEBUG">DEBUG</option>
                <option value="INFO">INFO</option>
                <option value="WARNING">WARNING</option>
                <option value="ERROR">ERROR</option>
              </select>
            </div>
            <div class="logs-filter-row">
              <label class="logs-filter-label">Event</label>
              <input
                class="input logs-filter-input"
                type="text"
                value=${filters.event}
                onInput=${(e) => onFilterChange('event', e.target.value)}
                placeholder="contains..."
              />
            </div>
            <div class="logs-filter-row">
              <label class="logs-filter-label">Session</label>
              <input
                class="input logs-filter-input"
                type="text"
                value=${filters.session_id}
                onInput=${(e) => onFilterChange('session_id', e.target.value)}
                placeholder="exact session_id"
              />
            </div>
            <div class="logs-filter-row">
              <label class="logs-filter-label">Keyword</label>
              <input
                class="input logs-filter-input"
                type="text"
                value=${filters.q}
                onInput=${(e) => onFilterChange('q', e.target.value)}
                placeholder="search all fields"
              />
            </div>
            <div class="logs-filter-actions">
              <button class="btn btn-sm" onClick=${onSearch} disabled=${loading || !selectedDate}>Search</button>
              <button class="btn btn-sm" onClick=${onReset} disabled=${loading}>Reset</button>
              <button class="icon-btn" onClick=${onRefresh} title="Refresh file list" disabled=${loading}>↻</button>
            </div>
          </div>

          ${error && html`<div class="logs-error">${error}</div>`}

          ${loading && html`
            <div class="observability-empty">
              <div class="spinner"></div>
              <div class="observability-empty-text">Loading logs...</div>
            </div>
          `}

          ${!loading && !error && items.length === 0 && html`
            <div class="observability-empty">
              <div class="observability-empty-icon">🗒</div>
              <div class="observability-empty-text">No logs matched</div>
            </div>
          `}

          ${!loading && !error && items.length > 0 && html`
            <div class="logs-list">
              ${items.map(item => html`
                <div key=${item.line_no} class="log-row">
                  <button class="log-row-main" onClick=${() => onToggleExpand(item.line_no)}>
                    <span class="log-time">${formatDateTime(item.ts)}</span>
                    <span class="log-level ${levelClass(item.level)}">${item.level || '-'}</span>
                    <span class="log-event">${item.event || '-'}</span>
                    <span class="log-message">${item.message || ''}</span>
                  </button>
                  <div class="log-meta">
                    <span>line ${item.line_no}</span>
                    ${item.session_id && html`<span>sid: ${item.session_id}</span>`}
                    ${item.module && html`<span>${item.module}${item.function ? ':' + item.function : ''}</span>`}
                  </div>
                  ${expandedLineNo === item.line_no && html`
                    <pre class="log-raw">${JSON.stringify(item.raw, null, 2)}</pre>
                  `}
                </div>
              `)}
            </div>
          `}

          <div class="logs-pagination">
            <span class="logs-pagination-stat">${from}-${to} / ${total}</span>
            <div class="logs-pagination-actions">
              <button class="btn btn-sm" onClick=${onPrevPage} disabled=${loading || offset <= 0}>Prev</button>
              <button class="btn btn-sm" onClick=${onNextPage} disabled=${loading || !hasMore}>Next</button>
            </div>
          </div>
        </div>
      `;
    }

    // ============ Mount ============
    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
